# Auto-updates World Cup scores into Firestore on a schedule.
# Repo path: .github/workflows/update-scores.yml   (must be on the main branch)
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
#   FIREBASE_SERVICE_ACCOUNT  = the full JSON of a Firebase service-account key
#   FOOTBALL_TOKEN            = your football-data.org API token
#
# Note: GitHub's scheduled runs are best-effort and can be delayed several
# minutes. */15 is more reliable than */5 (high-frequency schedules get
# throttled). Treat this as ~15 min updates, not real-time.

name: Update scores

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install firebase-admin@12

      - run: node scripts/update-scores.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_TOKEN: ${{ secrets.FOOTBALL_TOKEN }}
          COMPETITION: WC
          SEASON: "2026"

      - name: Commit refreshed match results
        run: |
          if git diff --quiet -- matches.json; then
            echo "matches.json has no changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git commit -m "Update match results"
          git push

      # Tamper monitor: snapshots predictions/scores each run and writes anything
      # suspicious to the `flags` collection (shown in the organizer Flags panel).
      # `if: always()` so it still runs even if the score step above failed.
      - run: node scripts/monitor.mjs
        if: always()
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          MONITOR_LOCK_OFFSET_MIN: "60"

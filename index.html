<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EGEC · World Cup Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{
    --bg:#0B1512; --surface:#122019; --surface-2:#16271F; --surface-3:#1c3327;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16);
    --ink:#EAF2ED; --muted:#8AA89A; --faint:#5d7568;
    --gold:#F2C14E; --gold-dim:#b8924f;
    --live:#FF4D4D; --green:#34D17A; --blue:#4EA8F2;
    --radius:16px; --radius-sm:10px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(52,209,122,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(242,193,78,.06), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.5; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 18px 80px}

  /* ---------- Header ---------- */
  header.app{
    position:sticky;top:0;z-index:40;
    backdrop-filter:blur(10px);
    background:linear-gradient(180deg, rgba(11,21,18,.92), rgba(11,21,18,.72));
    border-bottom:1px solid var(--line);
  }
  .head-inner{max-width:920px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .crest{
    width:38px;height:38px;border-radius:10px;flex:0 0 auto;
    background:linear-gradient(150deg,var(--gold),var(--gold-dim));
    display:grid;place-items:center;color:#1a1206;font-family:"Oswald";font-weight:700;font-size:18px;
    box-shadow:0 4px 14px rgba(242,193,78,.25);
  }
  .brand h1{font-family:"Oswald";font-weight:600;font-size:18px;margin:0;letter-spacing:.3px;line-height:1.1}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  .head-spacer{flex:1 1 auto}
  .identity{display:flex;align-items:center;gap:8px}
  .identity input{
    background:var(--surface-2);border:1px solid var(--line-strong);color:var(--ink);
    border-radius:999px;padding:8px 14px;font-size:13px;font-family:inherit;width:150px;outline:none;
  }
  .identity input:focus{border-color:var(--gold)}
  .pts-chip{
    display:flex;align-items:center;gap:7px;background:var(--surface-2);
    border:1px solid var(--line-strong);border-radius:999px;padding:7px 13px;white-space:nowrap;
  }
  .pts-chip b{font-family:"Oswald";font-size:18px;color:var(--gold);line-height:1}
  .pts-chip span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* ---------- Hero / matchday ---------- */
  .hero{
    margin:22px 0 8px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 38px, transparent 38px 76px),
      linear-gradient(160deg,var(--surface-2),var(--surface));
    box-shadow:var(--shadow);
  }
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px 0}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .hero-body{padding:6px 18px 18px}
  .hero-cta{font-family:"Oswald";font-weight:600;font-size:clamp(20px,4.4vw,30px);letter-spacing:.3px;margin:2px 0 2px}
  .hero-cta .t{color:var(--ink)}
  .hero-clock{
    font-family:"Oswald";font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--gold);
  }
  .hero-clock.urgent{color:var(--live)}
  .hero-sub{color:var(--muted);font-size:13px}
  .live-ticker{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .live-pill{
    display:inline-flex;align-items:center;gap:8px;background:rgba(255,77,77,.1);
    border:1px solid rgba(255,77,77,.4);border-radius:999px;padding:6px 12px;font-size:13px
  }
  .live-pill .sc{font-family:"Oswald";font-weight:700;font-variant-numeric:tabular-nums}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:18px 0 14px;position:sticky;top:63px;z-index:30;
        background:linear-gradient(180deg,var(--bg) 70%,transparent)}
  .tab{
    flex:0 0 auto;border:1px solid var(--line-strong);background:transparent;color:var(--muted);
    padding:8px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:.15s;
  }
  .tab:hover{color:var(--ink);border-color:var(--gold-dim)}
  .tab.active{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .tab .badge{margin-left:6px;font-size:11px;opacity:.7}

  /* ---------- Match card ---------- */
  .card{
    border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--surface) );
    border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:.2s;
  }
  .card.live{border-color:rgba(255,77,77,.45);box-shadow:0 0 0 1px rgba(255,77,77,.15),var(--shadow)}
  .card-head{display:flex;align-items:center;justify-content:space-between;
             padding:10px 16px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
  .grp{font-family:"Oswald";letter-spacing:.5px;text-transform:uppercase}
  .status{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .status.live .dot{background:var(--live);animation:pulse 1.3s infinite}
  .status.live{color:var(--live)}
  .status.ft{color:var(--green)} .status.ft .dot{background:var(--green)}
  .status.locked{color:var(--gold)} .status.locked .dot{background:var(--gold)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,.6)}70%{box-shadow:0 0 0 7px rgba(255,77,77,0)}100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}}

  .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:18px 16px 8px}
  .team{display:flex;align-items:center;gap:11px;min-width:0}
  .team.away{justify-content:flex-end;text-align:right}
  .flag{font-size:30px;line-height:1;flex:0 0 auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .tname{font-family:"Oswald";font-weight:600;font-size:18px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:88px}
  .score{font-family:"Oswald";font-weight:700;font-size:34px;font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1}
  .score .sep{color:var(--faint);margin:0 4px}
  .vs{font-family:"Oswald";font-size:15px;color:var(--faint);letter-spacing:2px}
  .ko{font-size:11px;color:var(--muted);text-align:center}

  /* prediction zone */
  .pred{padding:6px 16px 16px}
  .pred-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
  .pred-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);width:100%;text-align:center;margin-bottom:2px}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;background:var(--surface-2)}
  .stepper button{width:34px;height:38px;border:0;background:transparent;color:var(--ink);font-size:18px;cursor:pointer;font-family:"Oswald"}
  .stepper button:hover:not(:disabled){background:var(--surface-3)}
  .stepper input{
    width:40px;height:38px;border:0;background:transparent;color:var(--ink);text-align:center;
    font-family:"Oswald";font-weight:700;font-size:20px;outline:none;font-variant-numeric:tabular-nums;
    border-left:1px solid var(--line);border-right:1px solid var(--line);
    -moz-appearance:textfield;
  }
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stepper:disabled,.stepper.disabled{opacity:.55}
  .stepper.disabled button{cursor:not-allowed}
  .pred-mid{font-family:"Oswald";color:var(--faint);font-size:18px}
  .lock-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:11px;font-size:12.5px}
  .lock-clock{font-family:"Oswald";font-weight:600;font-variant-numeric:tabular-nums;color:var(--muted)}
  .lock-clock.urgent{color:var(--live)}
  .saved{color:var(--green);font-weight:600;opacity:0;transition:opacity .25s}
  .saved.show{opacity:1}
  .locked-note{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12.5px;margin-top:11px}

  .result-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
  .yourpick{font-size:13px;color:var(--muted)}
  .yourpick b{color:var(--ink);font-family:"Oswald";font-weight:600}
  .pts-badge{font-family:"Oswald";font-weight:700;font-size:13px;border-radius:999px;padding:4px 11px}
  .pts-badge.hit{background:rgba(52,209,122,.14);color:var(--green);border:1px solid rgba(52,209,122,.4)}
  .pts-badge.part{background:rgba(242,193,78,.14);color:var(--gold);border:1px solid rgba(242,193,78,.4)}
  .pts-badge.miss{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}
  .pts-badge.none{background:transparent;color:var(--faint);border:1px dashed var(--line-strong)}

  /* ---------- Leaderboard ---------- */
  .board{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
  .board h2{font-family:"Oswald";font-weight:600;margin:0;padding:16px 18px;font-size:17px;border-bottom:1px solid var(--line);
            display:flex;align-items:center;justify-content:space-between}
  .board h2 .mode{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:"Inter";font-weight:600}
  .lb-row{display:grid;grid-template-columns:38px 1fr auto auto;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:0}
  .lb-row.me{background:rgba(242,193,78,.07)}
  .rank{font-family:"Oswald";font-weight:700;font-size:18px;color:var(--muted);text-align:center}
  .rank.gold{color:var(--gold)} .rank.silver{color:#cfd8dc} .rank.bronze{color:#cd8b5b}
  .lb-name{font-weight:600;display:flex;align-items:center;gap:8px;min-width:0}
  .lb-name .you{font-size:10px;background:var(--gold);color:#1a1206;border-radius:5px;padding:1px 6px;font-weight:700}
  .lb-name .demo{font-size:10px;color:var(--faint);border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px}
  .lb-played{font-size:12px;color:var(--muted);white-space:nowrap}
  .lb-pts{font-family:"Oswald";font-weight:700;font-size:20px;color:var(--gold);font-variant-numeric:tabular-nums;text-align:right;min-width:42px}

  .empty{text-align:center;color:var(--muted);padding:46px 20px;border:1px dashed var(--line-strong);border-radius:var(--radius)}
  .empty .big{font-family:"Oswald";font-size:20px;color:var(--ink);margin-bottom:6px}

  .foot{margin-top:26px;text-align:center;color:var(--faint);font-size:12px;line-height:1.7}
  .foot a{color:var(--muted)}
  .scoring-key{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:12px}
  .scoring-key b{color:var(--gold);font-family:"Oswald"}

  @media (max-width:560px){
    .identity input{width:118px}
    .tname{font-size:16px}
    .score{font-size:28px}
    .tabs{top:60px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="app">
  <div class="head-inner">
    <div class="brand">
      <div class="crest" id="crest">EG</div>
      <div>
        <h1 id="brandTitle">EGEC World Cup Predictor</h1>
        <div class="sub" id="brandSub">Office Pick'Em · 2026</div>
      </div>
    </div>
    <div class="head-spacer"></div>
    <div class="identity">
      <input id="nameInput" placeholder="Your name" autocomplete="off" spellcheck="false" />
      <div class="pts-chip"><b id="myPts">0</b><span>pts</span></div>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="hero" id="hero" style="display:none">
    <div class="hero-top"><span class="eyebrow" id="heroEyebrow">Matchday</span><span class="eyebrow" id="heroDate"></span></div>
    <div class="hero-body" id="heroBody"></div>
  </section>

  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>

  <div class="foot">
    <div class="scoring-key" id="scoringKey"></div>
    <div style="margin-top:10px">Picks lock <b id="lockMins">60</b> minutes before kickoff. Scores refresh automatically.</div>
    <div id="storageNote" style="margin-top:6px"></div>
  </div>
</div>

<script>
/* =========================================================================
   EGEC World Cup Predictor — app logic (vanilla JS, no build step)
   ========================================================================= */

/* ---- Embedded fallback data (used if matches.json can't be fetched) ---- */
const EMBEDDED = {
  matches: [
    {id:"g20-ned-swe",group:"F",home:"Netherlands",away:"Sweden",homeFlag:"🇳🇱",awayFlag:"🇸🇪",kickoff:"2026-06-20T16:00:00Z",venue:"Houston Stadium",status:"finished",homeScore:5,awayScore:1},
    {id:"g20-ger-civ",group:"E",home:"Germany",away:"Ivory Coast",homeFlag:"🇩🇪",awayFlag:"🇨🇮",kickoff:"2026-06-20T20:00:00Z",venue:"MetLife Stadium",status:"finished",homeScore:2,awayScore:1},
    {id:"g20-ecu-cuw",group:"E",home:"Ecuador",away:"Curaçao",homeFlag:"🇪🇨",awayFlag:"🇨🇼",kickoff:"2026-06-20T23:00:00Z",venue:"Lincoln Financial Field",status:"finished",homeScore:0,awayScore:0},
    {id:"g21-tun-jpn",group:"F",home:"Tunisia",away:"Japan",homeFlag:"🇹🇳",awayFlag:"🇯🇵",kickoff:"2026-06-21T17:00:00Z",venue:"Arrowhead Stadium",status:"finished",homeScore:0,awayScore:4},
    {id:"g21-esp-ksa",group:"H",home:"Spain",away:"Saudi Arabia",homeFlag:"🇪🇸",awayFlag:"🇸🇦",kickoff:"2026-06-21T19:00:00Z",venue:"Mercedes-Benz Stadium",status:"finished",homeScore:4,awayScore:0},
    {id:"g21-bel-irn",group:"G",home:"Belgium",away:"IR Iran",homeFlag:"🇧🇪",awayFlag:"🇮🇷",kickoff:"2026-06-21T21:00:00Z",venue:"SoFi Stadium",status:"finished",homeScore:1,awayScore:1},
    {id:"g21-uru-cpv",group:"H",home:"Uruguay",away:"Cabo Verde",homeFlag:"🇺🇾",awayFlag:"🇨🇻",kickoff:"2026-06-21T23:00:00Z",venue:"Hard Rock Stadium",status:"finished",homeScore:2,awayScore:2},
    {id:"g21-egy-nzl",group:"G",home:"Egypt",away:"New Zealand",homeFlag:"🇪🇬",awayFlag:"🇳🇿",kickoff:"2026-06-22T01:00:00Z",venue:"BC Place, Vancouver",status:"finished",homeScore:3,awayScore:1},
    {id:"g22-arg-aut",group:"J",home:"Argentina",away:"Austria",homeFlag:"🇦🇷",awayFlag:"🇦🇹",kickoff:"2026-06-22T17:00:00Z",venue:"AT&T Stadium, Arlington",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g22-fra-irq",group:"I",home:"France",away:"Iraq",homeFlag:"🇫🇷",awayFlag:"🇮🇶",kickoff:"2026-06-22T21:00:00Z",venue:"Lincoln Financial Field",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g22-nor-sen",group:"I",home:"Norway",away:"Senegal",homeFlag:"🇳🇴",awayFlag:"🇸🇳",kickoff:"2026-06-23T00:00:00Z",venue:"New York / New Jersey Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g22-jor-alg",group:"J",home:"Jordan",away:"Algeria",homeFlag:"🇯🇴",awayFlag:"🇩🇿",kickoff:"2026-06-23T03:00:00Z",venue:"San Francisco Bay Area Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g23-por-uzb",group:"K",home:"Portugal",away:"Uzbekistan",homeFlag:"🇵🇹",awayFlag:"🇺🇿",kickoff:"2026-06-23T17:00:00Z",venue:"Houston Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g23-eng-gha",group:"L",home:"England",away:"Ghana",homeFlag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",awayFlag:"🇬🇭",kickoff:"2026-06-23T20:00:00Z",venue:"Boston Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g23-pan-cro",group:"L",home:"Panama",away:"Croatia",homeFlag:"🇵🇦",awayFlag:"🇭🇷",kickoff:"2026-06-23T23:00:00Z",venue:"Toronto Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g23-col-cod",group:"K",home:"Colombia",away:"Congo DR",homeFlag:"🇨🇴",awayFlag:"🇨🇩",kickoff:"2026-06-24T02:00:00Z",venue:"Guadalajara Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g24-sui-can",group:"B",home:"Switzerland",away:"Canada",homeFlag:"🇨🇭",awayFlag:"🇨🇦",kickoff:"2026-06-24T19:00:00Z",venue:"BC Place, Vancouver",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g24-sco-bra",group:"C",home:"Scotland",away:"Brazil",homeFlag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",awayFlag:"🇧🇷",kickoff:"2026-06-24T22:00:00Z",venue:"Hard Rock Stadium, Miami",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g26-egy-irn",group:"G",home:"Egypt",away:"IR Iran",homeFlag:"🇪🇬",awayFlag:"🇮🇷",kickoff:"2026-06-27T03:00:00Z",venue:"Seattle Stadium",status:"scheduled",homeScore:null,awayScore:null},
    {id:"g26-nzl-bel",group:"G",home:"New Zealand",away:"Belgium",homeFlag:"🇳🇿",awayFlag:"🇧🇪",kickoff:"2026-06-27T03:00:00Z",venue:"BC Place, Vancouver",status:"scheduled",homeScore:null,awayScore:null}
  ]
};

const DEFAULT_CONFIG = {
  orgName:"EGEC", seasonLabel:"World Cup 2026 — Office Predictor",
  lockOffsetMinutes:60,
  scoring:{exactScore:5, correctOutcome:3, correctGoalsBonus:1},
  liveScores:{provider:"football-data", apiToken:"", competitionId:"WC"},
  storage:{mode:"local", firebase:{}},
  refreshMs:30000
};
const CFG = Object.assign({}, DEFAULT_CONFIG, (window.CONFIG||{}));
CFG.scoring = Object.assign({}, DEFAULT_CONFIG.scoring, (window.CONFIG&&window.CONFIG.scoring)||{});
CFG.storage = Object.assign({}, DEFAULT_CONFIG.storage, (window.CONFIG&&window.CONFIG.storage)||{});

const DEMO_PLAYERS = ["Mona","Karim","Hany","Salma","Tarek","Nour","Amir","Dina"];

/* ---------------- State ---------------- */
let MATCHES = [];
let USER = localStorage.getItem("egec_wc_user") || "";
let activeTab = "today";
let savedTimer = null;

/* ---------------- Storage adapter ---------------- */
const Store = {
  mode: CFG.storage.mode === "firebase" && CFG.storage.firebase && CFG.storage.firebase.apiKey ? "firebase" : "local",
  db:null, allCache:{},
  key(){ return "egec_wc_preds_"+(USER||"_anon"); },
  /* local */
  localGet(){ try{ return JSON.parse(localStorage.getItem(this.key())||"{}"); }catch(e){ return {}; } },
  localSet(p){ localStorage.setItem(this.key(), JSON.stringify(p)); },

  async init(){
    if(this.mode!=="firebase") return;
    try{
      const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const fsMod  = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = appMod.initializeApp(CFG.storage.firebase);
      this.db = fsMod.getFirestore(app); this._fs = fsMod;
      // live subscription to everyone's picks
      fsMod.onSnapshot(fsMod.collection(this.db,"predictions"),(snap)=>{
        this.allCache = {};
        snap.forEach(d=> this.allCache[d.id]=d.data());
        render();
      });
    }catch(e){ console.warn("Firebase init failed, falling back to local:",e); this.mode="local"; }
  },
  async getMine(){
    if(this.mode==="firebase" && USER){ const u=this.allCache[USER]; return (u&&u.picks)||{}; }
    return this.localGet();
  },
  async savePick(matchId, h, a){
    if(this.mode==="firebase" && USER){
      const fs=this._fs; const picks=Object.assign({}, (this.allCache[USER]&&this.allCache[USER].picks)||{});
      picks[matchId]={h,a};
      await fs.setDoc(fs.doc(this.db,"predictions",USER),{name:USER,picks},{merge:true});
    } else {
      const p=this.localGet(); p[matchId]={h,a}; this.localSet(p);
    }
  },
  /* all players for leaderboard */
  allPlayers(){
    if(this.mode==="firebase"){
      return Object.entries(this.allCache).map(([id,d])=>({name:d.name||id, picks:d.picks||{}, demo:false}));
    }
    // local: the real user + deterministic demo colleagues so the board looks alive
    const players=[];
    if(USER) players.push({name:USER, picks:this.localGet(), demo:false});
    DEMO_PLAYERS.forEach(n=> players.push({name:n, picks:demoPicks(n), demo:true}));
    return players;
  }
};

/* deterministic demo predictions so the demo leaderboard is consistent */
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function demoPicks(name){
  const out={};
  MATCHES.forEach(m=>{
    const r=mulberry32(hashStr(name+m.id));
    out[m.id]={h:Math.floor(r()*4), a:Math.floor(r()*4)};
  });
  return out;
}

/* ---------------- Time / state helpers ---------------- */
const now = ()=>Date.now();
const ko = m => new Date(m.kickoff).getTime();
const lockAt = m => ko(m) - CFG.lockOffsetMinutes*60000;
function liveState(m){
  if(m.status==="finished") return "finished";
  if(m.status==="live") return "live";
  if(now() >= ko(m)) return "live";   // kicked off but data not yet marked finished
  return "upcoming";
}
const isLocked = m => liveState(m)!=="upcoming" || now() >= lockAt(m);

function fmtCountdown(ms){
  if(ms<=0) return "00:00:00";
  const s=Math.floor(ms/1000), d=Math.floor(s/86400);
  const h=Math.floor((s%86400)/3600), mi=Math.floor((s%3600)/60), se=s%60;
  const pad=n=>String(n).padStart(2,"0");
  return (d>0? d+"d " : "")+pad(h)+":"+pad(mi)+":"+pad(se);
}
function fmtKO(m){
  const d=new Date(m.kickoff);
  return d.toLocaleString(undefined,{weekday:"short",hour:"2-digit",minute:"2-digit"});
}

/* ---------------- Scoring ---------------- */
function scorePick(pick, m){
  if(m.status!=="finished" || !pick || pick.h==null || pick.a==null) return {pts:0, kind:"none"};
  const ph=+pick.h, pa=+pick.a, fh=m.homeScore, fa=m.awayScore;
  if(ph===fh && pa===fa) return {pts:CFG.scoring.exactScore, kind:"hit"};
  let pts=0;
  const sameOutcome = Math.sign(ph-pa)===Math.sign(fh-fa);
  if(sameOutcome) pts+=CFG.scoring.correctOutcome;
  if(ph===fh) pts+=CFG.scoring.correctGoalsBonus;
  if(pa===fa) pts+=CFG.scoring.correctGoalsBonus;
  return {pts, kind: pts>0 ? "part" : "miss"};
}
function totalFor(picks){
  let total=0, played=0;
  MATCHES.forEach(m=>{
    if(m.status==="finished" && picks[m.id] && picks[m.id].h!=null){
      total+=scorePick(picks[m.id],m).pts; played++;
    }
  });
  return {total, played};
}

/* ---------------- Data loading ---------------- */
async function loadMatches(){
  try{
    const res=await fetch("matches.json",{cache:"no-store"});
    if(res.ok){ const j=await res.json(); if(j&&Array.isArray(j.matches)) MATCHES=j.matches; }
    else MATCHES=EMBEDDED.matches;
  }catch(e){ MATCHES=EMBEDDED.matches; }
  await mergeLiveScores();
}
async function mergeLiveScores(){
  const ls=CFG.liveScores;
  if(!ls || !ls.apiToken) return;       // no token -> rely on matches.json
  try{
    const r=await fetch(`https://api.football-data.org/v4/competitions/${ls.competitionId}/matches`,
      {headers:{"X-Auth-Token":ls.apiToken}});
    if(!r.ok) return;
    const data=await r.json();
    const byName={};
    (data.matches||[]).forEach(am=>{
      byName[(am.homeTeam.name+"|"+am.awayTeam.name).toLowerCase()]=am;
    });
    MATCHES.forEach(m=>{
      const am=byName[(m.home+"|"+m.away).toLowerCase()];
      if(!am) return;
      if(am.status==="FINISHED"){ m.status="finished"; }
      else if(am.status==="IN_PLAY"||am.status==="PAUSED"){ m.status="live"; }
      if(am.score&&am.score.fullTime){
        if(am.score.fullTime.home!=null) m.homeScore=am.score.fullTime.home;
        if(am.score.fullTime.away!=null) m.awayScore=am.score.fullTime.away;
      }
    });
  }catch(e){ /* silent: GitHub Pages may hit CORS; matches.json is the source of truth */ }
}

/* ---------------- Rendering ---------------- */
const $ = sel => document.querySelector(sel);
const el = (t,c)=>{const e=document.createElement(t); if(c) e.className=c; return e;};

const TABS=[
  {id:"today",label:"Today"},
  {id:"upcoming",label:"Upcoming"},
  {id:"finished",label:"Finished"},
  {id:"mine",label:"My Picks"},
  {id:"leaderboard",label:"Leaderboard"}
];

function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d.getTime();}
function endOfToday(){const d=new Date();d.setHours(23,59,59,999);return d.getTime();}

function matchesForTab(tab, picks){
  const sorted=[...MATCHES].sort((a,b)=>ko(a)-ko(b));
  if(tab==="today") return sorted.filter(m=> liveState(m)==="live" || (ko(m)>=startOfToday() && ko(m)<=endOfToday()));
  if(tab==="upcoming") return sorted.filter(m=> liveState(m)==="upcoming" || liveState(m)==="live");
  if(tab==="finished") return sorted.filter(m=> m.status==="finished").reverse();
  if(tab==="mine") return sorted.filter(m=> picks[m.id] && picks[m.id].h!=null);
  return [];
}

let CURRENT_PICKS={};

async function render(){
  CURRENT_PICKS = await Store.getMine();
  // header / brand
  $("#brandTitle").textContent = CFG.orgName+" World Cup Predictor";
  $("#crest").textContent = (CFG.orgName||"EG").slice(0,2).toUpperCase();
  $("#lockMins").textContent = CFG.lockOffsetMinutes;
  $("#nameInput").value = USER;
  const mine=totalFor(CURRENT_PICKS);
  $("#myPts").textContent = mine.total;

  // scoring key
  $("#scoringKey").innerHTML =
    `<span><b>${CFG.scoring.exactScore}</b> exact score</span>`+
    `<span><b>${CFG.scoring.correctOutcome}</b> correct result</span>`+
    `<span><b>+${CFG.scoring.correctGoalsBonus}</b> per exact goals</span>`;
  $("#storageNote").innerHTML = Store.mode==="firebase"
    ? "Shared mode: everyone's picks &amp; leaderboard are live."
    : "Local mode: picks saved in this browser. Leaderboard shows demo colleagues until shared mode is enabled.";

  // tabs
  const tabsEl=$("#tabs"); tabsEl.innerHTML="";
  TABS.forEach(t=>{
    const b=el("button","tab"+(t.id===activeTab?" active":""));
    b.textContent=t.label;
    if(t.id==="today"){const n=matchesForTab("today",CURRENT_PICKS).length; if(n){const s=el("span","badge");s.textContent=n;b.appendChild(s);}}
    b.onclick=()=>{activeTab=t.id; render();};
    tabsEl.appendChild(b);
  });

  renderHero();

  const view=$("#view"); view.innerHTML="";
  if(activeTab==="leaderboard"){ view.appendChild(renderBoard()); return; }

  const list=matchesForTab(activeTab,CURRENT_PICKS);
  if(!list.length){ view.appendChild(emptyState(activeTab)); return; }
  list.forEach(m=> view.appendChild(renderCard(m)));
  tick(); // sync countdowns immediately
}

function emptyState(tab){
  const e=el("div","empty");
  const msg={
    today:["No matches today","Check Upcoming to get your picks in early."],
    upcoming:["You're all caught up","No upcoming fixtures loaded yet."],
    finished:["Nothing finished yet","Results will show here once matches end."],
    mine:["No picks yet","Open Today or Upcoming and predict a scoreline."]
  }[tab]||["Nothing here",""];
  e.innerHTML=`<div class="big">${msg[0]}</div><div>${msg[1]}</div>`;
  return e;
}

function renderHero(){
  const hero=$("#hero"), body=$("#heroBody");
  const live=MATCHES.filter(m=>liveState(m)==="live");
  // next actionable match: upcoming, not locked, soonest to lock
  const actionable=MATCHES
    .filter(m=> liveState(m)==="upcoming" && now()<lockAt(m))
    .sort((a,b)=>lockAt(a)-lockAt(b))[0];

  if(!live.length && !actionable){ hero.style.display="none"; return; }
  hero.style.display="";
  $("#heroDate").textContent = new Date().toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
  body.innerHTML="";

  if(actionable){
    const has = CURRENT_PICKS[actionable.id] && CURRENT_PICKS[actionable.id].h!=null;
    const cta=el("div","hero-cta");
    cta.innerHTML=`<span class="t">${actionable.homeFlag} ${actionable.home} v ${actionable.away} ${actionable.awayFlag}</span> · `+
                  `<span class="hero-clock" data-countdown="${actionable.id}">--:--:--</span>`;
    const sub=el("div","hero-sub");
    sub.innerHTML = has ? "Your pick is in — you can still change it until picks lock."
                        : "Picks lock in the countdown above. Get your scoreline in.";
    $("#heroEyebrow").textContent = has ? "Pick locked-in window" : "Make your pick";
    body.appendChild(cta); body.appendChild(sub);
  } else {
    $("#heroEyebrow").textContent="Live now";
    const cta=el("div","hero-cta"); cta.innerHTML=`<span class="t">Matches in progress</span>`;
    body.appendChild(cta);
  }
  if(live.length){
    const ticker=el("div","live-ticker");
    live.forEach(m=>{
      const p=el("span","live-pill");
      p.innerHTML=`<span class="dot" style="background:var(--live)"></span>${m.homeFlag} ${m.home} `+
                  `<span class="sc">${m.homeScore??0}-${m.awayScore??0}</span> ${m.away} ${m.awayFlag}`;
      ticker.appendChild(p);
    });
    body.appendChild(ticker);
  }
}

function renderCard(m){
  const state=liveState(m), locked=isLocked(m), pick=CURRENT_PICKS[m.id];
  const card=el("div","card"+(state==="live"?" live":""));

  // head
  const head=el("div","card-head");
  const grp=el("span","grp"); grp.textContent="Group "+m.group+" · "+(m.venue||"");
  const st=el("span","status "+(state==="live"?"live":state==="finished"?"ft":locked?"locked":""));
  st.innerHTML=`<span class="dot"></span>${state==="live"?"LIVE":state==="finished"?"FULL TIME":locked?"LOCKED":"UPCOMING"}`;
  head.appendChild(grp); head.appendChild(st);
  card.appendChild(head);

  // scoreboard
  const sb=el("div","scoreboard");
  const home=el("div","team home");
  home.innerHTML=`<span class="flag">${m.homeFlag}</span><span class="tname">${m.home}</span>`;
  const center=el("div","center");
  if(state==="upcoming"){
    center.innerHTML=`<div class="vs">VS</div><div class="ko">${fmtKO(m)}</div>`;
  }else{
    center.innerHTML=`<div class="score">${m.homeScore??0}<span class="sep">-</span>${m.awayScore??0}</div>`;
  }
  const away=el("div","team away");
  away.innerHTML=`<span class="tname">${m.away}</span><span class="flag">${m.awayFlag}</span>`;
  sb.appendChild(home); sb.appendChild(center); sb.appendChild(away);
  card.appendChild(sb);

  // prediction zone
  const pred=el("div","pred");
  if(m.status==="finished"){
    const sc=scorePick(pick,m);
    const line=el("div","result-line");
    const yp=el("div","yourpick");
    yp.innerHTML = pick&&pick.h!=null ? `Your pick: <b>${pick.h}-${pick.a}</b>` : `<span style="color:var(--faint)">No pick made</span>`;
    const badge=el("span","pts-badge "+sc.kind);
    badge.textContent = sc.kind==="none" ? "—" :
      (sc.kind==="hit"?"Exact! +"+sc.pts : sc.pts>0?"+"+sc.pts+" pts":"0 pts");
    line.appendChild(yp); line.appendChild(badge);
    pred.appendChild(line);
  } else if(locked){
    const note=el("div","locked-note");
    note.innerHTML = pick&&pick.h!=null
      ? `<span class="status locked"><span class="dot"></span></span> Picks closed · your pick <b style="font-family:Oswald;color:var(--ink)">${pick.h}-${pick.a}</b>`
      : `<span class="status locked"><span class="dot"></span></span> Picks closed — no pick made`;
    pred.appendChild(note);
  } else {
    // editable steppers
    const label=el("div","pred-label"); label.textContent="Your scoreline prediction";
    const row=el("div","pred-row");
    row.appendChild(label);
    const sH=stepper(m,"h",pick? pick.h:"");
    const mid=el("span","pred-mid"); mid.textContent="–";
    const sA=stepper(m,"a",pick? pick.a:"");
    row.appendChild(sH); row.appendChild(mid); row.appendChild(sA);
    pred.appendChild(row);

    const lock=el("div","lock-row");
    lock.innerHTML=`<span style="color:var(--muted)">Locks in</span> `+
                   `<span class="lock-clock" data-countdown="${m.id}">--:--:--</span>`+
                   `<span class="saved" data-saved="${m.id}">Saved ✓</span>`;
    pred.appendChild(lock);
  }
  card.appendChild(pred);
  return card;
}

function stepper(m, side, val){
  const wrap=el("div","stepper");
  const minus=el("button"); minus.type="button"; minus.textContent="–";
  const input=document.createElement("input");
  input.type="number"; input.min=0; input.max=20; input.inputMode="numeric";
  input.value = val===0?0:(val||"");
  input.placeholder="0";
  const plus=el("button"); plus.type="button"; plus.textContent="+";
  const commit=()=>{
    let v=parseInt(input.value,10); if(isNaN(v)||v<0)v=0; if(v>20)v=20; input.value=v;
    savePick(m, side, v);
  };
  minus.onclick=()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.max(0,v-1);input.value=v;commit();};
  plus.onclick =()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.min(20,v+1);input.value=v;commit();};
  input.addEventListener("change",commit);
  input.addEventListener("blur",commit);
  wrap.appendChild(minus); wrap.appendChild(input); wrap.appendChild(plus);
  return wrap;
}

async function savePick(m, side, v){
  if(!USER){ flashName(); return; }
  const cur = CURRENT_PICKS[m.id] || {h:null,a:null};
  cur[side]=v;
  // require both values; default the other to 0 so a partial pick still counts
  if(cur.h==null) cur.h=0; if(cur.a==null) cur.a=0;
  CURRENT_PICKS[m.id]=cur;
  await Store.savePick(m.id, cur.h, cur.a);
  const s=document.querySelector(`[data-saved="${m.id}"]`);
  if(s){ s.classList.add("show"); clearTimeout(savedTimer); savedTimer=setTimeout(()=>s.classList.remove("show"),1400); }
  $("#myPts").textContent=totalFor(CURRENT_PICKS).total;
}

function flashName(){
  const n=$("#nameInput"); n.focus();
  n.style.borderColor="var(--live)";
  n.placeholder="Enter your name first";
  setTimeout(()=>n.style.borderColor="",1200);
}

function renderBoard(){
  const board=el("div","board");
  const players=Store.allPlayers().map(p=>{
    const t=totalFor(p.picks);
    return {name:p.name, demo:p.demo, pts:t.total, played:t.played};
  }).sort((a,b)=> b.pts-a.pts || b.played-a.played || a.name.localeCompare(b.name));

  const h=el("h2");
  h.innerHTML=`<span>🏆 Leaderboard</span><span class="mode">${Store.mode==="firebase"?"Shared":"Demo + you"}</span>`;
  board.appendChild(h);

  if(!players.length){ const e=el("div","empty");e.innerHTML='<div class="big">No players yet</div><div>Enter your name and start predicting.</div>';board.appendChild(e);return board; }

  players.forEach((p,i)=>{
    const row=el("div","lb-row"+(p.name===USER&&!p.demo?" me":""));
    const rk=el("div","rank"+(i===0?" gold":i===1?" silver":i===2?" bronze":""));
    rk.textContent=i+1;
    const nm=el("div","lb-name");
    nm.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(p.name)}</span>`+
      (p.name===USER&&!p.demo?`<span class="you">YOU</span>`:"")+
      (p.demo?`<span class="demo">demo</span>`:"");
    const pl=el("div","lb-played"); pl.textContent=p.played+" scored";
    const pt=el("div","lb-pts"); pt.textContent=p.pts;
    row.appendChild(rk);row.appendChild(nm);row.appendChild(pl);row.appendChild(pt);
    board.appendChild(row);
  });
  return board;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------------- Countdown tick (1s) ---------------- */
function tick(){
  document.querySelectorAll("[data-countdown]").forEach(node=>{
    const m=MATCHES.find(x=>x.id===node.getAttribute("data-countdown"));
    if(!m) return;
    const ms=lockAt(m)-now();
    node.textContent=fmtCountdown(ms);
    const urgent = ms<=15*60000 && ms>0;        // last 15 min before lock
    node.classList.toggle("urgent",urgent);
    if(ms<=0){
      // just locked -> refresh the card next full render
      if(!node._relocked){ node._relocked=true; setTimeout(()=>render(),400); }
    }
  });
}

/* ---------------- Wiring ---------------- */
$("#nameInput").addEventListener("input",e=>{
  USER=e.target.value.trim();
  localStorage.setItem("egec_wc_user",USER);
});
$("#nameInput").addEventListener("change",()=>render());
$("#nameInput").addEventListener("blur",()=>render());

let refreshing=false;
async function refresh(){
  if(refreshing) return; refreshing=true;
  // don't yank the DOM out from under a focused input
  const ae=document.activeElement;
  const typing = ae && ae.tagName==="INPUT" && ae.closest(".card");
  await loadMatches();
  if(!typing) await render();
  refreshing=false;
}

(async function init(){
  document.title = (CFG.orgName||"EGEC")+" · World Cup Predictor";
  await loadMatches();
  await Store.init();
  // pick a sensible starting tab
  if(!matchesForTab("today",await Store.getMine()).length) activeTab="upcoming";
  await render();
  setInterval(tick,1000);
  setInterval(refresh, CFG.refreshMs||30000);
})();
</script>

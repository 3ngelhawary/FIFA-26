<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EGEC · World Cup Predictor</title>
<link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/1/17/2026_FIFA_World_Cup_emblem.svg">
<link rel="shortcut icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/1/17/2026_FIFA_World_Cup_emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{
    --bg:#05060c;
    --panel:#0c0e1a; --panel-2:#11142400; --card:#0b0d18; --card-2:#0e1122;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.16);
    --ink:#eef1ff; --muted:#8b90b5; --faint:#565c83;
    --cyan:#00e5ff; --magenta:#ff2e97; --purple:#b14eff;
    --win:#2bff88; --draw:#ffe600; --lose:#ff2d55;
    --radius:18px; --radius-sm:11px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(900px 480px at 82% -8%, rgba(255,46,151,.16), transparent 60%),
      radial-gradient(820px 460px at -8% 4%, rgba(0,229,255,.14), transparent 58%),
      radial-gradient(700px 700px at 50% 120%, rgba(177,78,255,.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--magenta);color:#fff}
  .wrap{max-width:940px;margin:0 auto;padding:0 16px 90px}
  .neon-cyan{color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,.55)}
  .neon-mag{color:var(--magenta);text-shadow:0 0 8px rgba(255,46,151,.55)}

  /* ===== Auth ===== */
  .auth{min-height:100vh;display:grid;place-items:center;padding:30px 16px}
  .auth-card{
    width:100%;max-width:420px;border:1px solid var(--line-2);border-radius:24px;
    background:linear-gradient(180deg,rgba(20,22,40,.85),rgba(10,11,22,.9));
    box-shadow:0 0 0 1px rgba(255,46,151,.08),0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(0,229,255,.08);
    padding:30px 26px;backdrop-filter:blur(8px);
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .bolt{
    width:54px;height:76px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    background:none;box-shadow:none;border-radius:0;overflow:hidden;
  }
  .bolt img{
    width:100%;height:100%;object-fit:contain;display:block;
    filter:drop-shadow(0 0 12px rgba(255,255,255,.10)) drop-shadow(0 0 18px rgba(255,46,151,.18));
  }
  .logo h1{font-family:"Oswald";font-weight:700;font-size:24px;margin:0;letter-spacing:.5px;line-height:1}
  .logo .s{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
  .seg{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:4px;margin:22px 0 18px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;
    padding:10px;border-radius:9px;cursor:pointer;font-size:14px;transition:.15s}
  .seg button.on{background:linear-gradient(135deg,var(--cyan),var(--magenta));color:#04060e;box-shadow:0 0 18px rgba(0,229,255,.35)}
  label.fld{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:0 0 7px}
  .input{
    width:100%;background:#070912;border:1px solid var(--line-2);color:var(--ink);border-radius:12px;
    padding:14px 15px;font-size:16px;font-family:inherit;outline:none;transition:.15s;
  }
  .input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.18)}
  .input.code{font-family:"Oswald";font-weight:700;letter-spacing:5px;text-transform:uppercase;text-align:center;font-size:22px}
  .btn{
    width:100%;margin-top:16px;border:0;border-radius:12px;cursor:pointer;font-family:"Oswald";font-weight:600;
    font-size:17px;letter-spacing:.5px;padding:14px;color:#04060e;
    background:linear-gradient(135deg,var(--cyan),var(--magenta));box-shadow:0 0 22px rgba(255,46,151,.35);transition:.15s;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line-2);box-shadow:none}
  .err{color:var(--lose);font-size:13px;margin-top:10px;min-height:18px;text-align:center}
  .hint-sm{color:var(--faint);font-size:12px;margin-top:14px;text-align:center;line-height:1.6}

  .spinner{width:34px;height:34px;border-radius:50%;margin:18px auto 0;
    border:3px solid rgba(255,255,255,.12);border-top-color:var(--cyan);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .setup-title{font-family:"Oswald";font-weight:600;font-size:20px;margin:18px 0 6px}
  .setup-lead{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 14px}
  .setup-steps{margin:0 0 14px;padding-left:20px;color:var(--ink);font-size:13.5px;line-height:1.8}
  .setup-steps li{margin-bottom:2px}
  .mono{font-family:"Oswald";letter-spacing:.4px;color:var(--cyan);background:rgba(0,229,255,.08);padding:1px 6px;border-radius:5px}
  pre.rules{background:#070912;border:1px solid var(--line-2);border-radius:11px;padding:12px;font-size:11.5px;line-height:1.5;
    color:#bfe9ff;overflow-x:auto;white-space:pre;margin:0 0 14px}
  .errd{color:var(--lose);font-size:12px;background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.3);
    border-radius:9px;padding:9px 11px;margin-bottom:12px;word-break:break-word}

  .code-reveal{text-align:center}
  .code-reveal .big-code{
    font-family:"Oswald";font-weight:700;font-size:40px;letter-spacing:8px;margin:14px 0 6px;
    color:var(--cyan);text-shadow:0 0 18px rgba(0,229,255,.6)
  }
  .copy-btn{border:1px solid var(--line-2);background:rgba(255,255,255,.04);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px}
  .warn{background:rgba(255,230,0,.08);border:1px solid rgba(255,230,0,.3);color:var(--draw);
    border-radius:12px;padding:11px 13px;font-size:13px;margin:16px 0;line-height:1.5}

  /* ===== Header ===== */
  header.app{position:sticky;top:0;z-index:40;backdrop-filter:blur(12px);
    background:linear-gradient(180deg,rgba(5,6,12,.92),rgba(5,6,12,.6));border-bottom:1px solid var(--line)}
  .head-inner{max-width:940px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .bolt{width:32px;height:46px}
  .brand h1{font-family:"Oswald";font-weight:600;font-size:17px;margin:0;letter-spacing:.4px;line-height:1.05}
  .brand .s{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
  .head-spacer{flex:1}
  .me-chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line-2);border-radius:999px;padding:5px 6px 5px 13px;background:rgba(255,255,255,.03)}
  .me-chip .nm{font-weight:700;font-size:13px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .me-chip .pts{font-family:"Oswald";font-weight:700;color:var(--cyan);font-size:16px;text-shadow:0 0 8px rgba(0,229,255,.5)}
  .me-chip .pts small{color:var(--muted);font-size:9px;letter-spacing:.5px;text-shadow:none}
  .icon-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--line-2);background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
  .icon-btn:hover{color:var(--ink);border-color:var(--magenta)}

  /* ===== Hero ===== */
  .hero{margin:20px 0 6px;border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;
    background:linear-gradient(120deg,rgba(255,46,151,.1),rgba(0,229,255,.07));position:relative}
  .hero:before{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 40px,transparent 40px 80px);pointer-events:none}
  .hero-in{position:relative;padding:16px 18px}
  .hero-layout{display:flex;align-items:center;justify-content:space-between;gap:16px}
  .hero-main{min-width:0;flex:1}
  .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--magenta);font-weight:700}
  /* Hidden organizer entry point — looks like plain text. Normal cursor, no
     text-selection on multi-click, and touch-action:manipulation stops phones
     from zooming on the rapid triple-tap. The padding is a safe tap margin. */
  .lock-x{cursor:default;color:inherit;display:inline-block;padding:3px 8px;margin:0 -2px;
    -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .lock-x:hover{cursor:default;color:inherit}
  .hero-cta{font-family:"Oswald";font-weight:600;font-size:clamp(19px,4.4vw,28px);margin:4px 0 2px;letter-spacing:.3px}
  .hero-clock{font-family:"Oswald";font-weight:700;font-variant-numeric:tabular-nums;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.55)}
  .hero-clock.urgent{color:var(--lose);text-shadow:0 0 12px rgba(255,45,85,.6)}
  .hero-sub{color:var(--muted);font-size:13px}
  .hero-prize{width:250px;flex:0 0 250px;border:1px solid rgba(255,230,0,.38);border-radius:15px;padding:12px 13px;background:linear-gradient(135deg,rgba(255,230,0,.12),rgba(255,46,151,.12));box-shadow:0 0 22px rgba(255,230,0,.08)}
  .hero-prize-kicker{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--draw);font-weight:800}
  .hero-prize-title{font-family:"Oswald";font-size:19px;font-weight:700;color:var(--ink);line-height:1.15;margin-top:3px}
  .hero-prize-sub{font-size:12px;color:var(--muted);margin-top:4px}
  .live-ticker{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .live-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.45);
    border-radius:999px;padding:5px 11px;font-size:12.5px}
  .live-pill .sc{font-family:"Oswald";font-weight:700}

  /* ===== Tabs ===== */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:18px 0 14px;position:sticky;top:58px;z-index:30;
    background:linear-gradient(180deg,var(--bg) 72%,transparent);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line-2);background:rgba(255,255,255,.02);color:var(--muted);
    padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
  .tab:hover{color:var(--ink)}
  .tab.active{color:#04060e;background:linear-gradient(135deg,var(--cyan),var(--magenta));border-color:transparent;box-shadow:0 0 16px rgba(0,229,255,.3)}
  .tab .badge{margin-left:6px;font-size:11px;opacity:.8}

  /* ===== Match card ===== */
  .card{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;
    background:linear-gradient(180deg,var(--card),var(--card-2));position:relative;transition:.2s}
  .card.live{border-color:rgba(255,45,85,.5);box-shadow:0 0 22px rgba(255,45,85,.14)}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .grp{font-family:"Oswald";letter-spacing:.5px;text-transform:uppercase}
  .status{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11.5px;letter-spacing:.6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .status.live{color:var(--lose)} .status.live .dot{background:var(--lose);animation:pulse 1.2s infinite}
  .status.ft{color:var(--win)} .status.ft .dot{background:var(--win)}
  .status.locked{color:var(--draw)} .status.locked .dot{background:var(--draw)}
  .status.pending{color:var(--draw)} .status.pending .dot{background:var(--draw);opacity:.8}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,85,.6)}70%{box-shadow:0 0 0 8px rgba(255,45,85,0)}100%{box-shadow:0 0 0 0 rgba(255,45,85,0)}}

  .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:18px 14px 10px}
  .team{display:flex;align-items:center;gap:11px;min-width:0}
  .team.away{justify-content:flex-end;text-align:right}
  .flag{width:34px;height:25px;border-radius:4px;object-fit:cover;flex:0 0 auto;border:1px solid rgba(255,255,255,.18);
    box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .flag-emo{font-size:28px;line-height:1;flex:0 0 auto}
  .tname{font-family:"Oswald";font-weight:600;font-size:18px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tname.placeholder{color:var(--faint);font-weight:500;text-transform:none;letter-spacing:0}
  .center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:92px}
  .score{font-family:"Oswald";font-weight:700;font-size:36px;font-variant-numeric:tabular-nums;line-height:1;display:flex;align-items:center;gap:6px}
  .score .sep{color:var(--faint)}
  .vs{font-family:"Oswald";font-size:15px;color:var(--faint);letter-spacing:3px}
  .ko{font-size:11px;color:var(--muted);text-align:center}
  /* result colors */
  .win .tname,.s-win{color:var(--win);text-shadow:0 0 10px rgba(43,255,136,.45)}
  .lose .tname,.s-lose{color:var(--lose);text-shadow:0 0 10px rgba(255,45,85,.4)}
  .draw .tname,.s-draw{color:var(--draw);text-shadow:0 0 10px rgba(255,230,0,.4)}

  /* prediction zone */
  .pred{padding:4px 15px 15px}
  .pred-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);text-align:center;margin-bottom:7px}
  .pred-row{display:flex;align-items:center;justify-content:center;gap:12px}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:11px;overflow:hidden;background:#070912}
  .stepper button{width:34px;height:40px;border:0;background:transparent;color:var(--ink);font-size:19px;cursor:pointer;font-family:"Oswald"}
  .stepper button:hover{background:rgba(0,229,255,.12);color:var(--cyan)}
  .stepper input{width:42px;height:40px;border:0;background:transparent;color:var(--cyan);text-align:center;
    font-family:"Oswald";font-weight:700;font-size:21px;outline:none;text-shadow:0 0 8px rgba(0,229,255,.5);
    border-left:1px solid var(--line);border-right:1px solid var(--line);-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .pred-mid{font-family:"Oswald";color:var(--faint);font-size:18px}
  .lock-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:11px;font-size:12.5px;color:var(--muted)}
  .lock-clock{font-family:"Oswald";font-weight:600;font-variant-numeric:tabular-nums;color:var(--draw)}
  .lock-clock.urgent{color:var(--lose);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.45}}
  .saved{color:var(--win);font-weight:700;opacity:0;transition:opacity .25s}
  .saved.show{opacity:1}
  .hint{text-align:center;color:var(--faint);font-size:11.5px;margin-top:8px}
  .locked-note{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12.5px;margin-top:6px}
  .locked-note b{font-family:"Oswald";color:var(--ink)}

  .result-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .yourpick{font-size:13px;color:var(--muted)} .yourpick b{color:var(--ink);font-family:"Oswald"}
  .pts-badge{font-family:"Oswald";font-weight:700;font-size:13px;border-radius:999px;padding:4px 11px}
  .pts-badge.hit{background:rgba(43,255,136,.14);color:var(--win);border:1px solid rgba(43,255,136,.45)}
  .pts-badge.part{background:rgba(255,230,0,.14);color:var(--draw);border:1px solid rgba(255,230,0,.45)}
  .pts-badge.miss{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}
  .pts-badge.none{background:transparent;color:var(--faint);border:1px dashed var(--line-2)}

  /* predictions reveal panel */
  .reveal{border-top:1px solid var(--line)}
  .reveal-btn{width:100%;background:transparent;border:0;color:var(--muted);cursor:pointer;font-family:inherit;
    font-size:12.5px;font-weight:700;padding:11px 15px;display:flex;align-items:center;justify-content:center;gap:8px}
  .reveal-btn:hover{color:var(--cyan)}
  .reveal-btn .chev{transition:transform .2s} .reveal-btn.open .chev{transform:rotate(90deg)}
  .reveal-panel{padding:0 13px 13px}
  .reveal-cap{font-size:11px;color:var(--faint);text-align:center;padding:2px 0 9px}
  .pick-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;font-size:13px}
  .pick-row:nth-child(odd){background:rgba(255,255,255,.025)}
  .pick-row.you{background:rgba(0,229,255,.08)}
  .pick-row .pn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
  .pick-row .pp{font-family:"Oswald";font-weight:700;font-size:15px;color:var(--ink)}
  .pick-row .hidden-sc{color:var(--faint);font-size:12px;font-style:italic}
  .tag{font-size:9.5px;border-radius:5px;padding:1px 6px;font-weight:700;letter-spacing:.4px}
  .tag.you{background:var(--cyan);color:#04060e} .tag.me-tag{background:var(--magenta);color:#fff}

  /* ===== Roster / Leaderboard ===== */
  .panel{border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;background:linear-gradient(180deg,var(--card),var(--card-2))}
  .panel h2{font-family:"Oswald";font-weight:600;margin:0;padding:15px 17px;font-size:17px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between}
  .panel h2 .meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:"Inter";font-weight:700}
  .lb-row{display:grid;grid-template-columns:36px 1fr auto auto;gap:12px;align-items:center;padding:12px 17px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .18s,border-color .18s}
  .lb-row:last-child{border-bottom:0}
  .lb-row:hover{background:rgba(0,229,255,.055)}
  .lb-row.me{background:rgba(255,46,151,.07)}
  .lb-row.me:hover{background:rgba(255,46,151,.11)}
  .rank{font-family:"Oswald";font-weight:700;font-size:18px;color:var(--muted);text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;line-height:1}
  .rank.g1{color:var(--draw);text-shadow:0 0 10px rgba(255,230,0,.5)} .rank.g2{color:#d6def0} .rank.g3{color:#ff9d5c}
  .lb-move{font-family:"Oswald";font-weight:800;font-size:10px;letter-spacing:.2px;line-height:1;text-shadow:none}
  .lb-move.up{color:var(--win)} .lb-move.down{color:var(--lose)}
  .lb-name{font-weight:700;display:flex;align-items:center;gap:8px;min-width:0}
  .lb-name span.n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-sub{font-size:12px;color:var(--muted);white-space:nowrap}
  .lb-pts{font-family:"Oswald";font-weight:700;font-size:20px;color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,.45);text-align:right;min-width:42px}


  .member-modal{position:fixed;inset:0;z-index:88;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(2,5,13,.82);backdrop-filter:blur(8px)}
  .member-card{width:min(860px,100%);max-height:min(86vh,820px);display:flex;flex-direction:column;border:1px solid rgba(0,229,255,.28);border-radius:22px;background:linear-gradient(160deg,rgba(14,17,34,.98),rgba(10,12,24,.98));box-shadow:0 30px 90px rgba(0,0,0,.68),0 0 32px rgba(0,229,255,.12);overflow:hidden}
  .member-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 17px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(0,229,255,.08),rgba(255,46,151,.05))}

  .roster-row{display:flex;align-items:center;gap:12px;padding:12px 17px;border-bottom:1px solid var(--line)}

/* SHA-256 hex of a string (used to compare against the hashed admin password /
   organizer code so the plaintext never appears in config.js or index.html). */
async function sha256hex(s){
  try{
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(String(s)));
    return[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
  }catch(e){return"";}
}
/* Only the one authorised login code may reach organizer mode. */
async function isAuthorizedOrg(){
  return !!(ME&&CFG.organizerUserCodeHash&&(await sha256hex(ME.code))===CFG.organizerUserCodeHash);
}

/* ---------------- Storage (shared / Firebase only) ---------------- */
const Store={
  ready:false, error:"", errDetail:"",
  db:null, fs:null,
  cache:{players:{},preds:{},results:{},flags:{}},
  loaded:{players:false,preds:false,results:false,flags:false},

  async init(){
    const cfg=CFG.storage.firebase||{};
    if(!cfg.apiKey||!cfg.projectId){ this.error="config"; return; }
    try{
      const a=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const f=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app=a.initializeApp(cfg); this.db=f.getFirestore(app); this.fs=f;
      const loadOnce=async(col,key)=>{
        const s=await f.getDocs(f.collection(this.db,col));
        this.cache[key]={};
        s.forEach(d=>this.cache[key][d.id]=d.data());
        this.loaded[key]=true;
      };
      await Promise.all([
        loadOnce("players","players"),
        loadOnce("predictions","preds"),
        loadOnce("results","results"),
        loadOnce("flags","flags")
      ]);
      this.ready=true;
      const sub=(col,key)=>f.onSnapshot(f.collection(this.db,col),
        s=>{ this.cache[key]={}; s.forEach(d=>this.cache[key][d.id]=d.data()); this.loaded[key]=true; render(); },
        err=>{ this.error="rules"; this.errDetail=err.message||String(err); render(); });
      sub("players","players"); sub("predictions","preds"); sub("results","results"); sub("flags","flags");
    }catch(e){ this.error="init"; this.errDetail=(e&&e.message)||String(e); }
  },

  players(){return this.cache.players;},
  predsAll(){return this.cache.preds;},
  resultsAll(){return this.cache.results;},
  flagsAll(){return this.cache.flags;},
  getByCode(code){const p=this.players();return p[code]?{name:p[code].name,code}:null;},

  async addPlayer(name){
    let code; do{code=genCode();}while(this.players()[code]);
    const rec={name,code,createdAt:Date.now()};
    await this.fs.setDoc(this.fs.doc(this.db,"players",code),rec);
    return code;
  },

  myPicks(code){const all=this.predsAll();return (all[code]&&all[code].picks)||{};},
  myTop3(code){const all=this.predsAll();return (all[code]&&all[code].top3)||{};},
  top3Result(){
    const saved=this.resultsAll()[TOP3_DOC_ID];
    if(saved&&saved.first&&saved.second&&saved.third)return saved;
    return deriveTop3Result();
  },

  async savePick(code,name,matchId,h,a,extra){
    const cur=(this.cache.preds[code]&&this.cache.preds[code].picks)||{};
    const prev=cur[matchId]||{};
    cur[matchId]=Object.assign({},prev,{h,a},extra||{});
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,picks:cur,updatedAt:this.fs.serverTimestamp()},{merge:true});
  },

  // Knockout shootout pick: who the player thinks advances when they
  // predicted a level score after 120'. side = "home" | "away" | null.
  async savePenPick(code,name,matchId,side){
    const cur=(this.cache.preds[code]&&this.cache.preds[code].picks)||{};
    const prev=cur[matchId]||{h:0,a:0};
    cur[matchId]=Object.assign({},prev,{pen:side});
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,picks:cur,updatedAt:this.fs.serverTimestamp()},{merge:true});
  },

  async saveTop3(code,name,top3){
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,top3,top3UpdatedAt:Date.now(),updatedAt:this.fs.serverTimestamp()},{merge:true});
  },

  async setResult(matchId,h,a,status,advance){
    await this.fs.setDoc(this.fs.doc(this.db,"results",matchId),{homeScore:h,awayScore:a,status,advance:advance||null});
  },

  async setTop3Result(first,second,third){
    await this.fs.setDoc(this.fs.doc(this.db,"results",TOP3_DOC_ID),{first,second,third,status:"final",updatedAt:Date.now()});
  },

  async clearResult(matchId){
    try{ await this.fs.deleteDoc(this.fs.doc(this.db,"results",matchId)); }catch(e){}
  },

  async clearTop3Result(){
    try{ await this.fs.deleteDoc(this.fs.doc(this.db,"results",TOP3_DOC_ID)); }catch(e){}
  },

  async deletePick(code,name,matchId){
    const cur=Object.assign({},(this.cache.preds[code]&&this.cache.preds[code].picks)||{});
    delete cur[matchId];
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,picks:cur},{merge:true});
  },

  async deletePlayer(code){
    await this.fs.deleteDoc(this.fs.doc(this.db,"players",code));
    try{ await this.fs.deleteDoc(this.fs.doc(this.db,"predictions",code)); }catch(e){}
  }
};

function genCode(){
  const A="ABCDEFGHJKMNPQRSTUVWXYZ23456789";let s="";
  for(let i=0;i<6;i++)s+=A[Math.floor(Math.random()*A.length)];
  return s;
}

/* Sign-up name rule: exactly two names, letters only, single space between
   (e.g. "Mohamed Salah"). Latin + accented + Arabic letters allowed. */
const NAME_LETTERS="A-Za-z\\u00C0-\\u024F\\u0600-\\u06FF";
const NAME_FILTER=new RegExp("[^"+NAME_LETTERS+" ]","g");
const NAME_RE=new RegExp("^["+NAME_LETTERS+"]{2,} ["+NAME_LETTERS+"]{2,}$");
function validateFullName(raw){
  const name=String(raw||"").trim().replace(/\s+/g," ");
  if(!NAME_RE.test(name)) return {ok:false,error:"Enter exactly two names with a space — e.g. Mohamed Salah."};
  return {ok:true,value:name};
}
function nameTaken(name){
  const lc=name.toLowerCase();
  return Object.values(Store.players()).some(p=>String(p.name||"").trim().toLowerCase()===lc);
}

function staleRemoteResult(local,remote){

function friendlyMatchName(x){

function isPlaceholderTeam(name){
  const s=String(name||"").trim();
  if(!s)return true;
  return /^(TBD|TBC|TBA|To be (confirmed|decided|determined|announced)|Winner of|Winners of|Loser of|Losers of|\d+(st|nd|rd|th) Group|[123]rd Group|[12]nd Group|[12]st Group)/i.test(s);
}
function isConcreteTeamName(name){return !isPlaceholderTeam(name);}
function hasPlaceholderTeams(m){return isPlaceholderTeam(m.home)||isPlaceholderTeam(m.away);}
function roundDisplay(m){return isKnockout(m)?(m.round||"Knockout"):"Group "+m.group;}
/* per-round color class, used on match cards (all tabs) and the bracket */
const ROUND_CLASS={"Round of 32":"rc-r32","Round of 16":"rc-r16","Quarterfinal":"rc-qf","Semifinal":"rc-sf","3rd Place Playoff":"rc-third","Final":"rc-final"};
function roundClass(m){return isKnockout(m)?(ROUND_CLASS[m.round]||"rc-ko"):"rc-group";}
function shortMatchName(m){return friendlyMatchName(m);}
function resultWinnerSide(m){
  if(!m||m.status!=="finished"||m.homeScore==null||m.awayScore==null)return "";
  if(m.homeScore>m.awayScore)return "home";
  if(m.awayScore>m.homeScore)return "away";
  if(isKnockout(m)&&(m.advance==="home"||m.advance==="away"))return m.advance; // shootout
  return "";
}
function resolvedParticipant(source,fallbackName,fallbackFlag,stack,matchId){
  if(!source){
    const g=resolveGroupSlot(fallbackName,matchId);
    if(g)return{name:g.name,flag:g.flag||fallbackFlag||"",placeholder:!!g.placeholder};
    return{name:fallbackName,flag:fallbackFlag||"",placeholder:isPlaceholderTeam(fallbackName)};
  }
  const src=resolvedMatch(source.matchId,stack);
  if(!src)return{name:(source.type==="loser"?"Loser":"Winner")+" of "+friendlyMatchName(source.matchId),flag:"",placeholder:true};
  const win=resultWinnerSide(src);
  if(!win)return{name:(source.type==="loser"?"Loser":"Winner")+" of "+shortMatchName(src),flag:"",placeholder:true};
  const side=source.type==="loser"?(win==="home"?"away":"home"):win;
  return{name:side==="home"?src.home:src.away,flag:side==="home"?src.homeFlag:src.awayFlag,placeholder:false};
}
function resultForMatch(match){
  if(!match)return null;
  const res=Store.resultsAll();
  return res[match.id]||(match.externalId?res[String(match.externalId)]:null)||null;
}
function resolvedMatch(id,stack){
  const raw=rawMatchById(id);if(!raw)return null;
  stack=stack||{};if(stack[id])return Object.assign({},raw);stack[id]=true;
  const m=Object.assign({},raw);
  const hp=resolvedParticipant(raw.homeSource,raw.home,raw.homeFlag,stack,raw.id);
  const ap=resolvedParticipant(raw.awaySource,raw.away,raw.awayFlag,stack,raw.id);
  m.home=hp.name;m.homeFlag=hp.flag;m.away=ap.name;m.awayFlag=ap.flag;
  const r=resultForMatch(raw);
  if(r){
    const useHome=r.home&&(isConcreteTeamName(r.home)||!isConcreteTeamName(m.home));
    const useAway=r.away&&(isConcreteTeamName(r.away)||!isConcreteTeamName(m.away));
    if(useHome)m.home=r.home;if(useAway)m.away=r.away;
    if(useHome&&r.homeFlag)m.homeFlag=r.homeFlag;if(useAway&&r.awayFlag)m.awayFlag=r.awayFlag;
    if(!staleRemoteResult(m,r)){
      m.homeScore=r.homeScore;m.awayScore=r.awayScore;m.status=r.status||m.status;
      if(r.homePenScore!==undefined)m.homePenScore=r.homePenScore;
      if(r.awayPenScore!==undefined)m.awayPenScore=r.awayPenScore;
      if(r.advance!==undefined)m.advance=r.advance;
      m.liveMinute=r.liveMinute;m.liveText=r.liveText;
      if(r.kickoff)m.kickoff=r.kickoff;
    }
  }
  delete stack[id];
  return m;
}
/* ---- Group standings -> Round-of-32 qualifiers ----
   Resolves "1st Group X" / "2nd Group X" placeholders into the real
   qualified team (with flag) once that group's matches are all finished.
   "3rd Group A/B/C/D/F" combo slots are labelled with the candidate
   third-placed teams once known, but not assigned (no best-thirds table). */
function teamFlagMap(){
  const map={};
  MATCHES.forEach(m=>{
    if(m.home&&m.homeFlag&&!isPlaceholderTeam(m.home))map[m.home]=m.homeFlag;
    if(m.away&&m.awayFlag&&!isPlaceholderTeam(m.away))map[m.away]=m.awayFlag;
  });
  return map;
}
function groupStanding(letter){
  const ms=MATCHES.filter(m=>!isKnockout(m)&&String(m.group).toUpperCase()===letter);
  if(!ms.length)return null;
  const allDone=ms.every(m=>{
    const r=resultForMatch(m)||{};
    const stale=staleRemoteResult(m,r);
    const status=stale?m.status:(r.status||m.status);
    const hs=!stale&&r.homeScore!=null?r.homeScore:m.homeScore;
    const as=!stale&&r.awayScore!=null?r.awayScore:m.awayScore;
    return status==="finished"&&hs!=null&&as!=null;
  });
  if(!allDone)return null;
  const table={};
  const ensure=(name,flag)=>{if(!table[name])table[name]={team:name,flag:flag||"",pts:0,gf:0,ga:0,gd:0};if(flag&&!table[name].flag)table[name].flag=flag;return table[name];};
  ms.forEach(m=>{
    const r=resultForMatch(m)||{};
    const stale=staleRemoteResult(m,r);
    const hs=!stale&&r.homeScore!=null?r.homeScore:m.homeScore;
    const as=!stale&&r.awayScore!=null?r.awayScore:m.awayScore;
    const h=ensure(m.home,m.homeFlag),a=ensure(m.away,m.awayFlag);
    h.gf+=hs;h.ga+=as;a.gf+=as;a.ga+=hs;
    if(hs>as)h.pts+=3;else if(as>hs)a.pts+=3;else{h.pts++;a.pts++;}
  });
  Object.values(table).forEach(t=>t.gd=t.gf-t.ga);
  return Object.values(table).sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.team.localeCompare(y.team));
}
/* ---- Third-place R32 slots ----
   Each R32 "3rd Group …/…" slot can be assigned to one group whose
   third-placed team fills it. Set a group letter to assign; remove the
   line (or leave it out) to show TBD. Allowed groups per slot:
     53452541: A/B/C/D/F   53452543: C/D/F/G/H
     53452563: C/E/F/H/I   53452565: E/H/I/J/K
     53452555: A/E/H/I/J   53452553: B/E/F/I/J
     53452505: E/F/G/I/J   53452507: D/E/I/J/L  */
const THIRD_PLACE_GROUP={
  "53452565":"K"
};
function resolveGroupSlot(name,matchId){
  const s=String(name||"");
  let mt=s.match(/^(1st|2nd)\s+Group\s+([A-L])\b/i);
  if(mt){
    const idx=mt[1].toLowerCase()==="1st"?0:1;
    const t=groupStanding(mt[2].toUpperCase());
    if(t&&t[idx])return{name:t[idx].team,flag:t[idx].flag||teamFlagMap()[t[idx].team]||"",placeholder:false};
    return null;
  }
  mt=s.match(/^3rd\s+Group\s+([A-L\/]+)/i);
  if(mt){
    const L=THIRD_PLACE_GROUP[String(matchId)];
    if(L){
      const t=groupStanding(String(L).toUpperCase());
      if(t&&t[2])return{name:t[2].team,flag:t[2].flag||teamFlagMap()[t[2].team]||"",placeholder:false};
      return{name:"3rd Group "+String(L).toUpperCase(),flag:"",placeholder:true};
    }
    return{name:"TBD",flag:"",placeholder:true};
  }
  return null;
}
function allEffectiveMatches(){return MATCHES.map(m=>eff(m));}

/* ---------------- Time / state ---------------- */
const now=()=>Date.now();
const ko=m=>new Date(m.kickoff).getTime();
const lockAt=m=>ko(m)-CFG.lockOffsetMinutes*60000;
function liveState(m){if(m.status==="finished")return"finished";if(m.status==="live")return"live";if(now()>=ko(m))return"pending";return"upcoming";}
const isLocked=m=>liveState(m)!=="upcoming"||now()>=lockAt(m);
function outcome(m){if(m.homeScore==null||m.awayScore==null)return null;if(m.homeScore>m.awayScore)return"home";if(m.awayScore>m.homeScore)return"away";return"draw";}

function fmtCountdown(ms){if(ms<=0)return"00:00:00";const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),mi=Math.floor((s%3600)/60),se=s%60,p=n=>String(n).padStart(2,"0");return(d>0?d+"d ":"")+p(h)+":"+p(mi)+":"+p(se);}
const APP_TIME_ZONE="Africa/Cairo";
function dayKeyInAppTime(t){
  const parts=new Intl.DateTimeFormat("en-CA",{timeZone:APP_TIME_ZONE,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date(t));
  const vals={};parts.forEach(x=>{vals[x.type]=x.value;});
  return vals.year+"-"+vals.month+"-"+vals.day;
}
function fmtKO(m){return new Date(m.kickoff).toLocaleString(undefined,{weekday:"short",hour:"2-digit",minute:"2-digit",timeZone:APP_TIME_ZONE});}
function liveBadgeText(m){
  if(m.liveText)return m.liveText;
  if(!m.kickoff)return "";
  const kickoffTime=new Date(m.kickoff).getTime();
  if(Number.isNaN(kickoffTime))return "";
  const diff=Math.floor((now()-kickoffTime)/60000);
  if(diff<1)return "1'";
  if(diff<=45)return diff+"'";
  if(diff<=60)return "45+'";
  if(diff<=105)return (diff-15)+"'";
  if(diff<=120)return "90+'";
  return "";
}

/* ---------------- Top 3 prediction window ---------------- */
const top3OpenAt=()=>new Date(CFG.top3.openAt).getTime();
const top3CloseAt=()=>new Date(CFG.top3.closeAt).getTime();
function top3State(){const n=now();if(n<top3OpenAt())return"before";if(n>=top3CloseAt())return"closed";return"open";}
function fmtTop3Date(iso){return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function top3Teams(){
  const fmap=teamFlagMap();
  const fromCfg=Array.isArray(CFG.top3.teams)?CFG.top3.teams.filter(Boolean):[];
  if(fromCfg.length){
    return [...new Set(fromCfg)].sort((a,b)=>a.localeCompare(b)).map(n=>({name:n,flag:fmap[n]||""}));
  }
  // Only the teams that reached the Round of 32 (the remaining qualified teams).
  const map=new Map();
  allEffectiveMatches().forEach(m=>{
    if(m.round!=="Round of 32")return;
    if(m.home&&!isPlaceholderTeam(m.home)&&!map.has(m.home))map.set(m.home,m.homeFlag||fmap[m.home]||"");
    if(m.away&&!isPlaceholderTeam(m.away)&&!map.has(m.away))map.set(m.away,m.awayFlag||fmap[m.away]||"");
  });
  return [...map.entries()].map(([name,flag])=>({name,flag})).sort((a,b)=>a.name.localeCompare(b.name));
}
function hasCompleteTop3(t){return !!(t&&t.first&&t.second&&t.third);}
function hasUniqueTop3(t){return hasCompleteTop3(t)&&new Set([t.first,t.second,t.third]).size===3;}

/* ---------------- Scoring ---------------- */
function effectivePick(pick){
  return pick&&pick.h!=null?pick:{h:0,a:0,defaulted:true};
}
function scorePick(pick,m){
  if(m.status!=="finished"||m.homeScore==null||m.awayScore==null)return{pts:0,kind:"none"};
  const p=effectivePick(pick);
  const ph=+p.h,pa=+p.a,fh=m.homeScore,fa=m.awayScore;
  if(ph===fh&&pa===fa)return{pts:CFG.scoring.exactScore,kind:"hit",defaulted:!!p.defaulted};
  let pts=0;if(Math.sign(ph-pa)===Math.sign(fh-fa))pts+=CFG.scoring.correctOutcome;
  if(ph===fh)pts+=CFG.scoring.correctGoalsBonus;if(pa===fa)pts+=CFG.scoring.correctGoalsBonus;
  return{pts,kind:pts>0?"part":"miss",defaulted:!!p.defaulted};
}
/* ---- Knockout advancement (who goes through) ----
   The 120' scoreline is scored by scorePick above. The advanceBonus is awarded
   ONLY when a knockout tie is level after 120' and decided on penalties — you
   earn it for naming the team that wins the shootout (your pick.pen). Matches
   settled inside 120 minutes award no advance bonus. */
function wentToPenalties(m){
  return isKnockout(m)&&m.status==="finished"&&m.homeScore!=null&&m.awayScore!=null
    &&m.homeScore===m.awayScore&&(m.advance==="home"||m.advance==="away");
}
function penaltyDisplay(m){
  const show=isKnockout(m)&&(wentToPenalties(m)||liveState(m)==="live");
  if(!show||m.homePenScore==null||m.awayPenScore==null)return "";
  return `Pens ${m.homePenScore}-${m.awayPenScore}`;
}
function predictedAdvancer(pick){
  const p=effectivePick(pick);
  // The advance bonus is earned ONLY by naming the shootout winner, which the
  // app only lets you do when you predicted a level (draw) scoreline. A decisive
  // prediction (a win/loss after 120') is NOT eligible for the advance bonus —
  // even if its regulation winner happens to match the penalty winner. Such a
  // pick simply keeps its scoreline points (e.g. an exact-goals bonus).
  if(+p.h!==+p.a)return null;                        // decisive pick -> no advance bonus
  return p.pen==="home"||p.pen==="away"?p.pen:null;  // draw -> needs a shootout pick
}
function actualAdvancer(m){
  if(m.homeScore==null||m.awayScore==null)return null;
  if(m.homeScore>m.awayScore)return"home";
  if(m.awayScore>m.homeScore)return"away";
  return m.advance==="home"||m.advance==="away"?m.advance:null; // organizer shootout result
}
function advanceScore(pick,m){
  if(!wentToPenalties(m))return{pts:0,kind:"none",predicted:null,actual:null};
  const pa=predictedAdvancer(pick),aa=actualAdvancer(m);
  if(!pa||!aa)return{pts:0,kind:"none",predicted:pa,actual:aa};
  const hit=pa===aa;
  return{pts:hit?(CFG.scoring.advanceBonus||0):0,kind:hit?"hit":"miss",predicted:pa,actual:aa};
}

/* Automatically derive the official podium from the completed Final and
   3rd Place Playoff. A manually saved organizer result still has priority. */
function deriveTop3Result(){
  const final=allEffectiveMatches().find(m=>m.round==="Final");
  const thirdMatch=allEffectiveMatches().find(m=>m.round==="3rd Place Playoff");
  if(!final||!thirdMatch||final.status!=="finished"||thirdMatch.status!=="finished")return{};

  const finalWinner=actualAdvancer(final),thirdWinner=actualAdvancer(thirdMatch);
  if(!finalWinner||!thirdWinner)return{};

  const first=finalWinner==="home"?final.home:final.away;
  const second=finalWinner==="home"?final.away:final.home;
  const third=thirdWinner==="home"?thirdMatch.home:thirdMatch.away;
  if(!first||!second||!third||isPlaceholderTeam(first)||isPlaceholderTeam(second)||isPlaceholderTeam(third))return{};
  if(new Set([first,second,third]).size!==3)return{};

  return{first,second,third,status:"final",source:"matches"};
}

/* ---- Team boost (e.g. Egypt ×2 in the knockouts) ---- */
function boostTeam(){return (CFG.boost&&CFG.boost.team)||"";}
function boostedMatch(m){
  const b=CFG.boost||{};
  if(!b.enabled||!b.team)return false;
  if(b.knockoutOnly&&!isKnockout(m))return false;
  return m.home===b.team||m.away===b.team;
}
function matchMultiplier(m){return boostedMatch(m)?(CFG.boost.multiplier||1):1;}
/* the boosted team is out once a finished knockout tie they played didn't send them through */
function boostTeamKnockedOut(){
  const t=boostTeam();if(!t)return false;
  return allEffectiveMatches().some(m=>{
    if(!isKnockout(m)||m.status!=="finished")return false;
    const isHome=m.home===t,isAway=m.away===t;
    if(!isHome&&!isAway)return false;
    const adv=actualAdvancer(m);if(!adv)return false;
    return (isHome&&adv!=="home")||(isAway&&adv!=="away");
  });
}
function boostActive(){return !!(CFG.boost&&CFG.boost.enabled&&CFG.boost.team)&&!boostTeamKnockedOut();}
/* Render the boost team's flag as an image (flag emoji breaks on Windows -> shows "EG") */
function boostFlagImg(px){
  const t=boostTeam();
  const iso=flagIso(teamFlagMap()[t]||"",t)||(typeof ISO!=="undefined"?ISO[t]:"")||"";
  if(!iso)return esc(t);
  const sw=px>=40?160:40;
  return `<img src="https://flagcdn.com/w${sw}/${iso}.png" alt="" style="height:${px||14}px;width:auto;vertical-align:-2px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.35);display:inline-block">`;
}
function scoreTop3(top3){
  const a=Store.top3Result();
  if(!hasCompleteTop3(a))return{pts:0,kind:"none",bonus:false};
  if(!hasCompleteTop3(top3))return{pts:0,kind:"none",bonus:false};
  // Tolerant name match: strict === breaks on stray whitespace or case edits
  // made to matches.json after players saved their picks.
  const nm=s=>String(s||"").trim().toLowerCase();
  const same=(x,y)=>nm(x)===nm(y);
  let pts=0;
  if(same(top3.first,a.first))pts+=CFG.top3.firstPts;
  if(same(top3.second,a.second))pts+=CFG.top3.secondPts;
  if(same(top3.third,a.third))pts+=CFG.top3.thirdPts;
  const bonus=same(top3.first,a.first)&&same(top3.second,a.second)&&same(top3.third,a.third);
  if(bonus)pts+=CFG.top3.exactOrderBonus;
  return{pts,kind:pts>0?"hit":"miss",bonus};
}
function totalFor(picks,top3){
  const c=computeScore(picks,top3,{});
  return{total:c.total,played:c.played,scorePts:c.scorePts,top3Pts:c.top3Pts,top3Bonus:c.top3Bonus};
}

/* outcome a player predicted (home/away/draw) from a pick */
function pickOutcome(pick){const p=effectivePick(pick);if(+p.h>+p.a)return"home";if(+p.a>+p.h)return"away";return"draw";}
/* should a match count toward scoring? finished always; live counts only when projecting */
function scorable(m,projected){
  const hasScore=m.homeScore!=null&&m.awayScore!=null;
  if(m.status==="finished"&&hasScore)return true;
  if(projected&&m.status==="live"&&hasScore)return true;
  return false;
}

/* Master scorer: match points and Top 3, plus stats for
   profile. opts.projected counts in-play matches as if final. */
function computeScore(picks,top3,opts){
  opts=opts||{};const projected=!!opts.projected;
  const list=MATCHES.map(m=>eff(m)).filter(m=>scorable(m,projected)).sort((a,b)=>ko(a)-ko(b));

  let scorePts=0,exacts=0,correctOutcomes=0,confirmedScored=0,projectedScored=0;
  let run=0,longestStreak=0,currentStreak=0;

  list.forEach(m=>{
    const pick=picks[m.id];
    const earned=(scorePick(pick,m).pts+advanceScore(pick,m).pts)*matchMultiplier(m);
    scorePts+=earned;
    if(m.status!=="finished")projectedScored+=earned;else confirmedScored+=earned;

    const correct=pickOutcome(pick)===outcome(m);
    if(scorePick(pick,m).kind==="hit")exacts++;
    if(correct)correctOutcomes++;

    // streak tracking (confirmed-final matches only) — used for the live form tag & profile
    if(m.status==="finished"){
      if(correct){run++;currentStreak=run;if(run>longestStreak)longestStreak=run;}
      else{run=0;currentStreak=0;}
    }
  });

  const t3=scoreTop3(top3);
  const played=Object.values(picks).filter(x=>x&&x.h!=null).length;

  const total=scorePts+t3.pts;
  return{
    total,scorePts,top3Pts:t3.pts,top3Bonus:t3.bonus,
    played,exacts,correctOutcomes,longestStreak,currentStreak,
    confirmedScored,projectedScored,scoredCount:list.length
  };
}

/* predictors of a match: names always; scores only after lock (or your own) */
function predictorsFor(mm){
  const m=eff(mm),locked=isLocked(m),preds=Store.predsAll(),out=[];
  Object.entries(preds).forEach(([code,d])=>{
    const pk=d.picks&&d.picks[m.id];if(!pk||pk.h==null)return;
    const isYou=ME&&code===ME.code;
    let score=null;
    if(m.status==="finished"){
      const sc=scorePick(pk,m),adv=advanceScore(pk,m),pts=(sc.pts+adv.pts)*matchMultiplier(m);
      score={pts,kind:sc.kind==="hit"?"hit":pts>0?"part":"miss"};
    }
    out.push({name:d.name||"?",code,pick:pk,isYou,reveal:locked||isYou||isAdmin,score});
  });
  out.sort((a,b)=>(b.isYou-a.isYou)||((b.score?b.score.pts:0)-(a.score?a.score.pts:0))||a.name.localeCompare(b.name));
  return out;
}

function scoreValue(node,side){
  if(!node)return null;
  const keys=side==="home"?["home","homeTeam"]:["away","awayTeam"];
  for(const key of keys){
    if(node[key]==null)continue;
    const value=Number(node[key]);
    if(Number.isFinite(value))return value;
  }
  return null;
}
function scorePair(node){
  const home=scoreValue(node,"home"),away=scoreValue(node,"away");
  return home==null||away==null?null:{home,away};
}
function addScorePairs(a,b){return a&&b?{home:a.home+b.home,away:a.away+b.away}:null;}
function subtractScorePairs(a,b){
  if(!a||!b)return null;
  const pair={home:a.home-b.home,away:a.away-b.away};
  return pair.home>=0&&pair.away>=0?pair:null;
}
function scoreAfter120(apiMatch){
  const score=apiMatch&&apiMatch.score?apiMatch.score:{};
  const duration=score.duration||"REGULAR";
  const fullTime=scorePair(score.fullTime);
  const regularTime=scorePair(score.regularTime);
  const extraTime=scorePair(score.extraTime);
  const penalties=scorePair(score.penalties);
  if(duration==="PENALTY_SHOOTOUT"||penalties){
    return addScorePairs(regularTime,extraTime)||subtractScorePairs(fullTime,penalties)||fullTime;
  }
  if(duration==="EXTRA_TIME")return addScorePairs(regularTime,extraTime)||fullTime;
  return fullTime;
}
function penaltyScorePair(apiMatch){return scorePair(apiMatch&&apiMatch.score?apiMatch.score.penalties:null);}
function winnerSideFromApi(apiMatch){
  const winner=(apiMatch&&apiMatch.score&&apiMatch.score.winner)||"";
  if(winner==="HOME_TEAM"||winner==="HOME")return "home";
  if(winner==="AWAY_TEAM"||winner==="AWAY")return "away";
  return null;
}
function penaltyWinnerSide(apiMatch){
  const p=penaltyScorePair(apiMatch);
  if(p){if(p.home>p.away)return "home";if(p.away>p.home)return "away";}
  return winnerSideFromApi(apiMatch);
}
function actualAdvanceSideFromApi(appMatch,apiMatch,score120){
  if(!isKnockout(appMatch)||!score120)return null;
  if(score120.home>score120.away)return "home";
  if(score120.away>score120.home)return "away";
  return penaltyWinnerSide(apiMatch);
}

/* ---------------- Data loading ---------------- */
async function loadMatches(){
  try{const r=await fetch("matches.json",{cache:"no-store"});if(r.ok){const j=await r.json();if(j&&Array.isArray(j.matches))MATCHES=j.matches;else MATCHES=EMBEDDED.matches;}else MATCHES=EMBEDDED.matches;}
  catch(e){MATCHES=EMBEDDED.matches;}
  await mergeLive();
}
async function mergeLive(){
  const ls=CFG.liveScores;if(!ls||!ls.apiToken)return;
  try{const r=await fetch(`https://api.football-data.org/v4/competitions/${ls.competitionId}/matches`,{headers:{"X-Auth-Token":ls.apiToken}});
    if(!r.ok)return;const data=await r.json();const by={},byId={};
    (data.matches||[]).forEach(am=>{by[(am.homeTeam.name+"|"+am.awayTeam.name).toLowerCase()]=am;byId[String(am.id)]=am;});
    MATCHES.forEach(m=>{const am=byId[String(m.externalId||m.id)]||by[(m.home+"|"+m.away).toLowerCase()];if(!am)return;
      if(am.homeTeam&&isConcreteTeamName(am.homeTeam.name))m.home=am.homeTeam.name;
      if(am.awayTeam&&isConcreteTeamName(am.awayTeam.name))m.away=am.awayTeam.name;
      if(am.utcDate)m.kickoff=am.utcDate;
      if(am.status==="FINISHED")m.status="finished";else if(am.status==="IN_PLAY"||am.status==="PAUSED"||am.status==="EXTRA_TIME"||am.status==="PENALTY_SHOOTOUT")m.status="live";
      const score120=scoreAfter120(am);
      if(score120){m.homeScore=score120.home;m.awayScore=score120.away;}
      const pens=penaltyScorePair(am);
      if(pens){m.homePenScore=pens.home;m.awayPenScore=pens.away;}
      else{delete m.homePenScore;delete m.awayPenScore;}
      const adv=actualAdvanceSideFromApi(m,am,score120);
      if(adv)m.advance=adv;
      if(am.status==="PENALTY_SHOOTOUT"){m.liveText="PEN";m.liveMinute=null;}
    });
  }catch(e){}
}

  const myPicks=Store.myPicks(ME.code);
  const soon=allEffectiveMatches().filter(m=>{
    if(liveState(m)!=="upcoming"||hasPlaceholderTeams(m))return false;
    const ms=lockAt(m)-now();
    if(ms<=0||ms>WINDOW)return false;
    const p=myPicks[m.id];
    return !(p&&p.h!=null);
  }).sort((a,b)=>lockAt(a)-lockAt(b));
  if(soon.length){
    const n=soon.length,nm=el("div","banner nudge");
    nm.innerHTML=`<div class="bdot"></div><div><b>⏰ Lock reminder:</b> ${n} match${n===1?"":"es"} lock within 6 hours and you haven't predicted ${n===1?"it":"them"} — next one in <b data-countdown="${soon[0].id}">--:--:--</b>.<br><span style="color:var(--muted)">A default 0-0 applies if you don't pick.</span></div><button class="banner-btn" id="goPick">Predict now</button>`;
    box.appendChild(nm);
    const gp=$("#goPick");if(gp)gp.onclick=()=>{activeTab="upcoming";renderApp();};
  }

  // --- Shootout nudge: knockout draws locking soon with no advance pick ---
  const penPending=allEffectiveMatches().filter(m=>{
    if(liveState(m)!=="upcoming"||hasPlaceholderTeams(m)||!isKnockout(m))return false;
    const ms=lockAt(m)-now();
    if(ms<=0||ms>WINDOW)return false;
    const p=myPicks[m.id];
    return p&&p.h!=null&&(+p.h===+p.a)&&p.pen!=="home"&&p.pen!=="away";
  }).sort((a,b)=>lockAt(a)-lockAt(b));
  if(penPending.length){
    const n=penPending.length,pm=el("div","banner nudge");
    pm.innerHTML=`<div class="bdot"></div><div><b>🥅 Shootout reminder:</b> you predicted a draw in ${n} knockout match${n===1?"":"es"} but haven't picked who advances — next locks in <b data-countdown="${penPending[0].id}">--:--:--</b>.<br><span style="color:var(--muted)">No shootout pick = no +${CFG.scoring.advanceBonus} advance bonus.</span></div><button class="banner-btn" id="goPen">Pick now</button>`;
    box.appendChild(pm);
    const gpn=$("#goPen");if(gpn)gpn.onclick=()=>openPenaltyModal(penPending[0],null);
  }

  // --- Top 3 reminder ---
  if(top3State()!=="open"||hasCompleteTop3(Store.myTop3(ME.code)))return;
  const b=el("div","banner hot");
  b.innerHTML=`<div class="bdot"></div><div><b>Top 3 reminder:</b> predict your 1st, 2nd and 3rd rank before the window closes in <b data-top3-countdown="close">--:--:--</b>.<br><span style="color:var(--muted)">Exact order gives an extra +${CFG.top3.exactOrderBonus} points.</span></div><button class="banner-btn" id="goTop3">Predict Top 3</button>`;
  box.appendChild(b);
  const go=$("#goTop3");if(go)go.onclick=()=>{activeTab="top3";renderApp();};
}

/* Interactive flags-only bracket inside the Top 3 tab. Tap a flag to advance
   that team; winners flow to the next round, semifinal losers drop into the
   3rd-place match, and the simulated podium is shown live. This is a local
   "what-if" sandbox: it never changes real results or your saved prediction. */
function renderTop3Bracket(){
  const kos=allEffectiveMatches().filter(isKnockout);
  if(!kos.length)return null;
  const feeders=id=>kos.filter(m=>String(m.winnerTo)===String(id))
    .sort((a,b)=>((a.winnerSlot==="home")?0:1)-((b.winnerSlot==="home")?0:1)||ko(a)-ko(b));
  const FINAL=kos.find(m=>m.round==="Final");
  if(!FINAL)return null;
  const THIRD=kos.find(m=>m.round==="3rd Place Playoff");
  const sfFeed=feeders(FINAL.id);
  if(sfFeed.length<2)return null;
  const leftRoot=sfFeed[1],rightRoot=sfFeed[0];
  function subtree(root){
    const r32=[],r16=[],qf=[],sf=[root];
    feeders(root.id).forEach(q=>{qf.push(q);
      feeders(q.id).forEach(s=>{r16.push(s);
        feeders(s.id).forEach(l=>{r32.push(l);});});});
    return {r32,r16,qf,sf};
  }
  const L=subtree(leftRoot),R=subtree(rightRoot);
  if(L.r32.length<8||R.r32.length<8)return null;

  // ---- geometry ----
  const BW=30,FW=22,FH=15,CG=3,PV=5,BH=2*FH+CG+2*PV,LEAFGAP=12,TOP=24;
  const W=466,colL={r32:6,r16:58,qf:110,sf:162},FINX=216,FINW=34;
  const colR={r32:W-6-BW,r16:W-58-BW,qf:W-110-BW,sf:W-162-BW};
  const pos={};
  function placeSide(S,cols){
    S.r32.forEach((m,i)=>{pos[m.id]={x:cols.r32,yc:TOP+i*(BH+LEAFGAP)+BH/2};});
    const up=(nodes,col)=>nodes.forEach(n=>{const ys=feeders(n.id).map(f=>pos[f.id].yc);pos[n.id]={x:col,yc:ys.reduce((a,b)=>a+b,0)/ys.length};});
    up(S.r16,cols.r16);up(S.qf,cols.qf);up(S.sf,cols.sf);
  }
  placeSide(L,colL);placeSide(R,colR);
  const finalYc=(pos[leftRoot.id].yc+pos[rightRoot.id].yc)/2;
  pos[FINAL.id]={x:FINX,yc:finalYc};
  const THIRDYC=finalYc+92;
  if(THIRD)pos[THIRD.id]={x:FINX,yc:THIRDYC};
  const H=TOP+8*(BH+LEAFGAP)-LEAFGAP+8;

  // ---- static connectors / titles ----
  const lineCol="rgba(0,229,255,.42)";
  const conn=[];
  const elbowL=(parent,fs)=>{const px=pos[parent].x,py=pos[parent].yc;fs.forEach(f=>{const fp=pos[f.id],fx=fp.x+BW,mid=(fx+px)/2;conn.push(`<path d="M${fx} ${fp.yc} H${mid} V${py} H${px}" fill="none" stroke="${lineCol}" stroke-width="1.4"/>`);});};
  const elbowR=(parent,fs)=>{const px=pos[parent].x+BW,py=pos[parent].yc;fs.forEach(f=>{const fp=pos[f.id],fx=fp.x,mid=(fx+px)/2;conn.push(`<path d="M${fx} ${fp.yc} H${mid} V${py} H${px}" fill="none" stroke="${lineCol}" stroke-width="1.4"/>`);});};
  [...L.r16,...L.qf,...L.sf].forEach(n=>elbowL(n.id,feeders(n.id)));
  [...R.r16,...R.qf,...R.sf].forEach(n=>elbowR(n.id,feeders(n.id)));
  {const lp=pos[leftRoot.id],fx=lp.x+BW,px=FINX,mid=(fx+px)/2;conn.push(`<path d="M${fx} ${lp.yc} H${mid} V${finalYc} H${px}" fill="none" stroke="${lineCol}" stroke-width="1.4"/>`);}
  {const rp=pos[rightRoot.id],fx=rp.x,px=FINX+FINW,mid=(fx+px)/2;conn.push(`<path d="M${fx} ${rp.yc} H${mid} V${finalYc} H${px}" fill="none" stroke="${lineCol}" stroke-width="1.4"/>`);}
  const tt=(x,t)=>`<text x="${x}" y="14" font-size="7.5" fill="rgba(255,255,255,.55)" text-anchor="middle" font-weight="700" letter-spacing="0.5">${t}</text>`;
  const titles=[tt(colL.r32+BW/2,"R32"),tt(colL.r16+BW/2,"R16"),tt(colL.qf+BW/2,"QF"),tt(colL.sf+BW/2,"SF"),
                tt(FINX+FINW/2,"FINAL"),
                tt(colR.sf+BW/2,"SF"),tt(colR.qf+BW/2,"QF"),tt(colR.r16+BW/2,"R16"),tt(colR.r32+BW/2,"R32")].join("");
  const trophy=`<text x="${FINX+FINW/2}" y="${finalYc-BH/2-5}" font-size="13" text-anchor="middle">🏆</text>`;

  // ---- simulation state ----
  const sim=(window.__top3Sim=window.__top3Sim||{});
  const r32all=[...L.r32,...R.r32];
  function compute(){
    const part={};kos.forEach(m=>{part[m.id]={home:null,away:null};});
    r32all.forEach(m=>{
      part[m.id].home=(m.home&&!isPlaceholderTeam(m.home))?{name:m.home,flag:m.homeFlag}:null;
      part[m.id].away=(m.away&&!isPlaceholderTeam(m.away))?{name:m.away,flag:m.awayFlag}:null;
    });
    const order=[...L.r32,...R.r32,...L.r16,...R.r16,...L.qf,...R.qf,...L.sf,...R.sf,FINAL];
    order.forEach(m=>{
      const p=part[m.id];let w=sim[m.id];
      if(w&&!((p.home&&p.home.name===w)||(p.away&&p.away.name===w))){delete sim[m.id];w=null;}
      if(w){
        const winner=(p.home&&p.home.name===w)?p.home:p.away;
        const loser=(p.home&&p.home.name===w)?p.away:p.home;
        if(m.winnerTo&&m.winnerSlot&&part[m.winnerTo])part[m.winnerTo][m.winnerSlot]=winner;
        if(m.loserTo&&m.loserSlot&&part[m.loserTo])part[m.loserTo][m.loserSlot]=loser||null;
      }
    });
    if(THIRD){const p=part[THIRD.id],w=sim[THIRD.id];if(w&&!((p.home&&p.home.name===w)||(p.away&&p.away.name===w)))delete sim[THIRD.id];}
    return part;
  }
  function chipG(mid,part,x,y){
    if(!part)return `<rect x="${x}" y="${y}" width="${FW}" height="${FH}" rx="2" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.14)" stroke-width="1"/>`;
    const sel=sim[mid];
    const state=sel?(sel===part.name?"win":"lose"):"none";
    const iso=flagIso(part.flag,part.name);
    const flagSvg=iso?`<image href="https://flagcdn.com/w40/${iso}.png" x="${x}" y="${y}" width="${FW}" height="${FH}" preserveAspectRatio="xMidYMid slice"/>`
                     :`<text x="${x+FW/2}" y="${y+FH-2}" font-size="13" text-anchor="middle">${part.flag||"🏳️"}</text>`;
    const border=state==="win"?`stroke="rgba(43,255,136,.95)" stroke-width="2"`:`stroke="rgba(0,0,0,.5)" stroke-width="1"`;
    const op=state==="lose"?` opacity="0.36"`:"";
    return `<g data-match="${esc(mid)}" data-team="${esc(part.name)}" style="cursor:pointer">`
      +`<rect x="${x-2}" y="${y-1}" width="${FW+4}" height="${FH+2}" fill="transparent" pointer-events="all"/>`
      +`<g${op}>${flagSvg}<rect x="${x}" y="${y}" width="${FW}" height="${FH}" rx="2" fill="none" ${border}/></g></g>`;
  }
  function box(m,pp,bw){
    const x=pos[m.id].x,yc=pos[m.id].yc,by=yc-BH/2,bwid=bw||BW,cx=x+(bwid-FW)/2;
    return `<rect x="${x}" y="${by}" width="${bwid}" height="${BH}" rx="6" fill="rgba(11,18,31,.92)" stroke="rgba(255,255,255,.12)" stroke-width="1"/>`
      +chipG(m.id,pp.home,cx,by+PV)+chipG(m.id,pp.away,cx,by+PV+FH+CG);
  }
  function flagMini(name){const iso=ISO[name];return iso?`<img class="t3sim-flagimg" src="https://flagcdn.com/w20/${iso}.png" alt="">`:`<span>${teamFlagMap()[name]||""}</span>`;}
  function podiumHtml(part){
    const champ=sim[FINAL.id]||"";const fp=part[FINAL.id];
    const runner=champ?((fp.home&&fp.home.name===champ)?(fp.away&&fp.away.name):(fp.home&&fp.home.name)):"";
    const third=THIRD?(sim[THIRD.id]||""):"";
    const cell=(medal,name)=>`<div class="t3sim-cell"><span class="t3sim-medal">${medal}</span>${name?flagMini(name)+`<span class="t3sim-team">${esc(name)}</span>`:'<span class="t3sim-empty">— pick —</span>'}</div>`;
    const ready=champ&&runner&&third;
    const apply=top3State()==="open"?`<button type="button" class="t3sim-apply" data-action="applyTop3" ${ready?"":"disabled"}>Use these for my Top 3</button>`:"";
    return `<div class="t3sim-podium">${cell("🥇",champ)}${cell("🥈",runner||"")}${cell("🥉",third)}</div>
      <div class="t3sim-actions">${apply}<button type="button" class="t3sim-reset" data-action="resetSim">↺ Reset</button></div>`;
  }

  const wrap=el("div","top3-bracket");
  let lastPart={};
  function draw(){
    const part=compute();lastPart=part;
    const boxes=[...L.r32,...R.r32,...L.r16,...R.r16,...L.qf,...R.qf,...L.sf,...R.sf].map(m=>box(m,part[m.id],BW)).join("");
    const finalBox=box(FINAL,part[FINAL.id],FINW);
    const thirdBox=THIRD?box(THIRD,part[THIRD.id],FINW):"";
    const thirdLbl=THIRD?`<text x="${FINX+FINW/2}" y="${THIRDYC-BH/2-4}" font-size="7.5" fill="rgba(255,255,255,.55)" text-anchor="middle" font-weight="700">3RD</text>`:"";
    const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interactive bracket">${conn.join("")}${titles}${trophy}${thirdLbl}${boxes}${finalBox}${thirdBox}</svg>`;
    wrap.innerHTML=`<div class="top3-bracket-cap">🗺️ Tap a flag to send that team through. Play out the whole bracket to study every path — it's a what-if and won't affect results.</div>
      <div class="top3-bracket-scroll">${svg}</div>${podiumHtml(part)}`;
  }
  wrap.addEventListener("click",e=>{
    const act=e.target.closest("[data-action]");
    if(act){
      const a=act.getAttribute("data-action");
      if(a==="resetSim"){Object.keys(sim).forEach(k=>delete sim[k]);draw();}
      else if(a==="applyTop3"){
        const champ=sim[FINAL.id],fp=lastPart[FINAL.id]||{};
        const runner=champ?((fp.home&&fp.home.name===champ)?(fp.away&&fp.away.name):(fp.home&&fp.home.name)):null;
        const third=THIRD?sim[THIRD.id]:null;
        if(!champ||!runner||!third){toast("Pick the final winner and the 3rd-place winner first");return;}
        applyTop3Slot("top3First",champ);applyTop3Slot("top3Second",runner);applyTop3Slot("top3Third",third);
        toast("Filled from your simulation — review and Save");
      }
      return;
    }
    const g=e.target.closest("[data-match][data-team]");
    if(g){const mid=g.getAttribute("data-match"),team=g.getAttribute("data-team");if(mid&&team){sim[mid]=team;draw();}}
  });
  draw();
  return wrap;
}

function stepper(m,side,val){
  const wrap=el("div","stepper");
  const minus=el("button");minus.type="button";minus.textContent="–";
  const input=document.createElement("input");input.type="number";input.min=0;input.max=20;input.inputMode="numeric";
  input.value=val===0?0:(val||"");input.placeholder="0";
  const plus=el("button");plus.type="button";plus.textContent="+";
  const commit=()=>{let v=parseInt(input.value,10);if(isNaN(v)||v<0)v=0;if(v>20)v=20;input.value=v;savePick(m,side,v);};
  minus.onclick=()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.max(0,v-1);input.value=v;commit();};
  plus.onclick=()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.min(20,v+1);input.value=v;commit();};
  input.addEventListener("change",commit);input.addEventListener("blur",commit);
  wrap.appendChild(minus);wrap.appendChild(input);wrap.appendChild(plus);return wrap;
}
async function savePick(m,side,v){
  const existing=Store.myPicks(ME.code)[m.id]||{};
  const cur=Object.assign({h:null,a:null},existing);
  cur[side]=v;if(cur.h==null)cur.h=0;if(cur.a==null)cur.a=0;
  const knockout=isKnockout(m), level=(+cur.h===+cur.a);
  let pen=existing.pen||null;
  if(!knockout||!level)pen=null;            // group, or decisive KO -> no shootout
  await Store.savePick(ME.code,ME.name,m.id,cur.h,cur.a,{pen});
  const s=document.querySelector(`[data-saved="${m.id}"]`);
  if(s){s.classList.add("show");clearTimeout(savedTimer);savedTimer=setTimeout(()=>s.classList.remove("show"),1300);}
  $(".me-chip .pts").innerHTML=totalFor(Store.myPicks(ME.code),Store.myTop3(ME.code)).total+'<small> PTS</small>';
  if(knockout&&level&&!pen)openPenaltyModal(m,null); // draw -> ask who advances
}

function enableTreePanZoom(scroll,board){
  const pts=new Map();
  let startDist=0,startZoom=1,panX=0,panY=0,panSL=0,panST=0,panning=false;
  scroll.addEventListener("pointerdown",e=>{
    if(e.target.closest("button"))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){panning=true;panX=e.clientX;panY=e.clientY;panSL=scroll.scrollLeft;panST=scroll.scrollTop;scroll.classList.add("grabbing");}
    else if(pts.size===2){panning=false;const a=[...pts.values()];startDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);startZoom=treeUserZoom;}
  });
  window.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size>=2){
      const a=[...pts.values()],d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(startDist>0){treeUserZoom=Math.min(5,Math.max(1,startZoom*(d/startDist)));fitTreeBoard(scroll,board);}
    }else if(panning){
      scroll.scrollLeft=panSL-(e.clientX-panX);scroll.scrollTop=panST-(e.clientY-panY);
    }
  });
  const up=e=>{pts.delete(e.pointerId);if(pts.size<2)startDist=0;if(pts.size===0){panning=false;scroll.classList.remove("grabbing");}};
  window.addEventListener("pointerup",up);
  window.addEventListener("pointercancel",up);
}
function fitTreeBoard(scroll,board){
  if(!scroll||!board)return;
  const sizer=board.parentNode;
  board.style.transform="none";
  const natW=board.offsetWidth,natH=board.offsetHeight;
  if(!natW||!natH)return;
  const availW=scroll.clientWidth;
  const top=scroll.getBoundingClientRect().top;
  const availH=Math.max(340,window.innerHeight-top-14);
  const fit=Math.min(availW/natW,availH/natH,1);
  const scale=fit*(treeUserZoom||1);
  board.style.transformOrigin="top left";
  board.style.transform="scale("+scale+")";
  if(sizer){sizer.style.width=(natW*scale)+"px";sizer.style.height=(natH*scale)+"px";}
  const zoomed=(treeUserZoom||1)>1.001;
  scroll.style.overflow=zoomed?"auto":"hidden";
  scroll.classList.toggle("pannable",zoomed);
  scroll.style.height=Math.min(natH*scale,availH)+"px";
}
function splitTreeSide(list,side){
  const mid=Math.ceil(list.length/2);
  const part=side==="left"?list.slice(0,mid):list.slice(mid);
  return side==="right"?part.slice().reverse():part;
}
/* Derive the left/right bracket halves and the ordered matches per round from
   the real feeder structure (winnerTo/winnerSlot), so the tree positions match
   the official bracket. Returns null if the bracket can't be fully resolved. */
function bracketSides(kos){
  const feeders=id=>kos.filter(m=>String(m.winnerTo)===String(id))
    .sort((a,b)=>((a.winnerSlot==="home")?0:1)-((b.winnerSlot==="home")?0:1)||ko(a)-ko(b));
  const FINAL=kos.find(m=>m.round==="Final");
  if(!FINAL)return null;
  const sf=feeders(FINAL.id);
  if(sf.length<2)return null;
  const sub=root=>{
    const r32=[],r16=[],qf=[],sfa=[root];
    feeders(root.id).forEach(q=>{qf.push(q);feeders(q.id).forEach(s=>{r16.push(s);feeders(s.id).forEach(l=>r32.push(l));});});
    return {r32,r16,qf,sf:sfa};
  };
  const left=sub(sf[1]),right=sub(sf[0]); // away half on the left, to match the official layout
  if(left.r32.length<8||right.r32.length<8)return null;
  return {left,right};
}

/* Persistent leaderboard movement: remembers the standings from before the
   most recent results change, so the ▲/▼ arrows show how each player moved.
   move > 0 => climbed (rank number got smaller). Survives re-renders; the
   baseline only advances when the actual standings change. */
const LB_RANK_KEY="egec_lb_ranks_v1";
function boardRankMovement(curRanks){
  const sig=Object.keys(curRanks).sort().map(c=>c+":"+curRanks[c]).join("|");
  let store=null;
  try{store=JSON.parse(localStorage.getItem(LB_RANK_KEY)||"null");}catch(e){store=null;}
  let prevRanks;
  if(!store||typeof store!=="object"){
    prevRanks=curRanks; // first run: no history yet
    try{localStorage.setItem(LB_RANK_KEY,JSON.stringify({sig,ranks:curRanks,prevRanks:curRanks}));}catch(e){}
  }else if(store.sig!==sig){
    prevRanks=store.ranks||curRanks; // standings just changed -> compare to the previous standings
    try{localStorage.setItem(LB_RANK_KEY,JSON.stringify({sig,ranks:curRanks,prevRanks}));}catch(e){}
  }else{
    prevRanks=store.prevRanks||curRanks; // unchanged -> keep showing the same movement
  }
  const move={};
  Object.keys(curRanks).forEach(c=>{const was=prevRanks[c];move[c]=(was==null)?0:(was-curRanks[c]);});
  return move;
}

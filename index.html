      <div class="member-stat"><b>${stats.correctOutcomes}</b><span>Results</span></div>
      <div class="member-stat"><b>${stats.top3Pts}</b><span>Top 3 pts</span></div>
      <div class="member-stat"><b>${stats.played}</b><span>Predicted</span></div>
    </div>
    <div class="member-body">
      ${top3HistoryHtml(code,player.name)}
      <div class="member-section-title">Match predictions <span>${rows.length} shown</span></div>
      <div class="history-list">${list}</div>
    </div>
  </div>`;
  const btn=modal.querySelector(".member-close");if(btn)btn.onclick=close;
  document.body.appendChild(modal);
}

function renderRoster(){
  const panel=el("div","panel");
  const players=Object.values(Store.players()).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  const preds=Store.predsAll();
  const h=el("h2");h.innerHTML=`<span>👥 Players</span><span class="meta">${players.length} registered</span>`;panel.appendChild(h);
  if(!players.length){const e=el("div","empty");e.innerHTML='<div class="big">No players yet</div>';panel.appendChild(e);return panel;}
  players.forEach(p=>{
    const d=preds[p.code]||{},picks=d.picks||{};const n=Object.values(picks).filter(x=>x&&x.h!=null).length,top3Done=hasCompleteTop3(d.top3);
    const row=el("div","roster-row");
    const av=el("div","av");av.textContent=(p.name[0]||"?").toUpperCase();
    const info=el("div","info");
    const mine=ME&&p.code===ME.code;
    info.innerHTML=`<div class="n">${esc(p.name)}${mine?' <span class="tag you">YOU</span>':''}</div>
      <div class="s">${n} prediction${n===1?"":"s"} made · Top 3 ${top3Done?"saved":"not saved"}${mine?` · your code <span class="mycode">${p.code}</span>`:(isAdmin?` · <span class="mycode">${p.code}</span>`:"")}</div>`;
    row.appendChild(av);row.appendChild(info);panel.appendChild(row);
  });
  return panel;
}

function renderFlagsPanel(){
  const panel=el("div","panel");
  const h=el("h2");h.innerHTML=`<span>🚩 Flags</span><span class="meta">automatic tamper watch</span>`;panel.appendChild(h);

  const all=Object.entries(Store.flagsAll()||{}).map(([id,f])=>Object.assign({id},f));
  // newest first (createdAt is a Firestore Timestamp; fall back to runAt)
  const tms=f=>{const c=f.createdAt;if(c&&typeof c.seconds==="number")return c.seconds*1000;if(typeof c==="number")return c;if(f.runAt){const t=Date.parse(f.runAt);if(!isNaN(t))return t;}return 0;};
  all.sort((a,b)=>tms(b)-tms(a));

  const alerts=all.filter(f=>f.type!=="baseline");
  const baseline=all.find(f=>f.type==="baseline");

  if(!Store.loaded.flags){
    const d=el("div","flag-clean");d.textContent="Loading monitor…";panel.appendChild(d);return panel;
  }
  if(!all.length){
    const d=el("div","flag-clean");
    d.innerHTML="Monitoring is not active yet. It starts flagging once the checker runs on your schedule.";
    panel.appendChild(d);return panel;
  }
  if(!alerts.length){
    const d=el("div","flag-clean");
    d.innerHTML="<b>No suspicious activity detected.</b>";
    if(baseline)d.innerHTML+=`<div class="flag-when" style="margin-top:6px">Watching for changes since ${fmtFlagTime(tms(baseline))}.</div>`;
    panel.appendChild(d);return panel;
  }

  const sevClass=s=>s==="high"?"high":s==="med"?"med":s==="info"?"info":"low";
  alerts.slice(0,100).forEach(f=>{
    const row=el("div","flag-row");
    const dot=el("div","flag-dot "+sevClass(f.severity));
    const body=el("div","flag-body");
    const parts=[];
    if(f.matchLabel)parts.push(`Match: <b>${esc(f.matchLabel)}</b>`);
    if(f.playerName||f.playerCode)parts.push(`Player: <b>${esc(f.playerName||"?")}</b>${f.playerCode?` (${esc(f.playerCode)})`:""}`);
    if(f.detail)parts.push(esc(f.detail));
    body.innerHTML=`<div class="flag-msg">${esc(f.message||f.type||"Flag")}</div>`+
      (parts.length?`<div class="flag-meta">${parts.join(" · ")}</div>`:"")+
      `<div class="flag-when">${fmtFlagTime(tms(f))}</div>`;
    row.appendChild(dot);row.appendChild(body);panel.appendChild(row);
  });
  if(baseline){
    const foot=el("div","flag-when");foot.style.padding="10px 15px";
    foot.textContent=`Watching for changes since ${fmtFlagTime(tms(baseline))}.`;
    panel.appendChild(foot);
  }
  return panel;
}
function fmtFlagTime(ms){
  if(!ms)return "";
  try{return new Date(ms).toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
  catch(e){return new Date(ms).toISOString();}
}

function renderOrg(){
  const wrap=el("div");

  /* ---- Read-only notice ---- */
  const notice=el("div","tree-admin");
  notice.style.margin="0 0 16px";
  notice.innerHTML="🔒 <b>Read-only organizer view.</b> You can reveal every player's hidden predictions here, but match scores and results can't be edited from the app — final scores update automatically. If this login ever leaks, no one can change any score.";
  wrap.appendChild(notice);

  /* ---- Flags: suspicious-activity monitor (written server-side) ---- */
  wrap.appendChild(renderFlagsPanel());

  const players=Object.values(Store.players()).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  const preds=Store.predsAll();

  /* ---- Players roster (read-only) ---- */
  const pPanel=el("div","panel");
  const ph=el("h2");ph.innerHTML=`<span>👥 Players</span><span class="meta">${players.length} registered · read-only</span>`;pPanel.appendChild(ph);
  if(!players.length){
    const e=el("div","empty");e.style.margin="14px";e.innerHTML='<div class="big">No players yet</div><div>Players appear here once they register.</div>';
    pPanel.appendChild(e);
  }else{
    players.forEach(p=>{
      const n=Object.values((preds[p.code]&&preds[p.code].picks)||{}).filter(x=>x&&x.h!=null).length;
      const row=el("div","org-prow");
      const av=el("div","av");av.textContent=(p.name[0]||"?").toUpperCase();
      const info=el("div","op-info");
      info.innerHTML=`<div class="n">${esc(p.name)}${ME&&p.code===ME.code?' <span class="tag you">YOU</span>':''}</div>
        <div class="op-code">code <b class="mycode">${p.code}</b> · ${n} pick${n===1?"":"s"}</div>`;
      const actions=el("div","op-actions");
      const copy=el("button","op-copy");copy.type="button";copy.title="Copy code";copy.textContent="📋";
      copy.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(p.code);toast("Copied "+p.name+"'s code");};
      actions.appendChild(copy);
      row.appendChild(av);row.appendChild(info);row.appendChild(actions);pPanel.appendChild(row);
    });
  }
  wrap.appendChild(pPanel);

  /* ---- All players' match predictions (hidden data revealed) ---- */
  const mPanel=el("div","panel");mPanel.style.marginTop="16px";
  const mh=el("h2");mh.innerHTML=`<span>🔮 All predictions</span><span class="meta">every player · scores revealed</span>`;mPanel.appendChild(mh);
  const arr=allEffectiveMatches().sort((a,b)=>ko(a)-ko(b));
  let anyPreds=false;
  arr.forEach(m=>{
    const people=predictorsFor(m);
    if(!people.length)return;
    anyPreds=true;
    const row=el("div","org-row "+roundClass(m));
    const head=el("div","ot");
    head.innerHTML=`${esc(m.home)} <span style="color:var(--faint)">v</span> ${esc(m.away)}${m.status==="finished"?` <b style="color:var(--cyan)">${m.homeScore}-${m.awayScore}</b>`:""}<br><span style="font-family:Inter;font-size:11px;color:var(--muted)">${roundDisplay(m)} · ${fmtKO(m)} · ${m.status}</span>`;
    row.appendChild(head);
    const list=el("div");list.style.gridColumn="1 / -1";list.style.marginTop="8px";
    people.forEach(p=>{
      const pr=el("div","pick-row"+(p.isYou?" you":""));
      let right="";
      if(p.reveal){
        if(p.score){const cls=p.score.kind==="hit"?"hit":p.score.kind==="part"?"part":"miss";
          right=`<span class="pp">${p.pick.h}-${p.pick.a}</span><span class="pts-badge ${cls}" style="font-size:11px;padding:2px 8px">${p.score.kind==="hit"?"+"+p.score.pts:p.score.pts>0?"+"+p.score.pts:"0"}</span>`;}
        else right=`<span class="pp">${p.pick.h}-${p.pick.a}</span>`;
      }else right=`<span class="hidden-sc">🔒 hidden</span>`;
      pr.innerHTML=`<span class="pn">${esc(p.name)}${p.isYou?'<span class="tag me-tag">YOU</span>':''}</span>${right}`;
      list.appendChild(pr);
    });
    row.appendChild(list);
    mPanel.appendChild(row);
  });
  if(!anyPreds){
    const e=el("div","empty");e.style.margin="14px";e.innerHTML='<div class="big">No predictions yet</div><div>Predictions from all players will appear here.</div>';
    mPanel.appendChild(e);
  }
  wrap.appendChild(mPanel);

  /* ---- Top 3 predictions (read-only) ---- */
  const tPanel=el("div","panel");tPanel.style.marginTop="16px";
  const th=el("h2");th.innerHTML=`<span>🏅 Top 3 predictions</span><span class="meta">every player · read-only</span>`;tPanel.appendChild(th);
  const actual=Store.top3Result();
  const resNote=el("div","top3-note");resNote.style.padding="12px 15px";
  resNote.innerHTML=hasCompleteTop3(actual)?`Official result: <b>${esc(actual.first)}</b> · <b>${esc(actual.second)}</b> · <b>${esc(actual.third)}</b>`:"Official Top 3 result not set yet.";
  tPanel.appendChild(resNote);

  /* ---- Official Top 3 result editor (organizer only) ----
     Writes results/__top3__ via Store.setTop3Result(). Until that doc exists,
     scoreTop3() returns 0 for everyone and no Top 3 points reach the totals. */
  const resEditor=el("div");resEditor.style.padding="0 15px 14px";
  const teamOpts=sel=>'<option value="">— select team —</option>'+top3Teams().map(t=>`<option value="${esc(t.name)}"${sel===t.name?" selected":""}>${esc(t.name)}</option>`).join("");
  resEditor.innerHTML=`
    <div class="top3-grid" style="padding:0 0 12px">
      <div class="top3-slot rank-1"><label>🥇 Official 1st</label><select id="orgT3First">${teamOpts(actual.first||"")}</select></div>
      <div class="top3-slot rank-2"><label>🥈 Official 2nd</label><select id="orgT3Second">${teamOpts(actual.second||"")}</select></div>
      <div class="top3-slot rank-3"><label>🥉 Official 3rd</label><select id="orgT3Third">${teamOpts(actual.third||"")}</select></div>
    </div>
    <div class="top3-actions" style="padding:0">
      <button class="top3-save" id="orgT3Save" type="button">${hasCompleteTop3(actual)?"Update Official Result":"Set Official Result"}</button>
      ${hasCompleteTop3(actual)?'<button class="top3-save" id="orgT3Clear" type="button" style="background:rgba(255,255,255,.08);color:var(--muted);box-shadow:none;border:1px solid var(--line-2)">Clear Result</button>':""}
    </div>
    <div class="top3-note" style="padding:10px 0 0">Saving publishes the podium and instantly adds Top 3 points (${CFG.top3.firstPts}/${CFG.top3.secondPts}/${CFG.top3.thirdPts} + ${CFG.top3.exactOrderBonus} exact-order bonus) to every player's total.</div>`;
  tPanel.appendChild(resEditor);
  setTimeout(()=>{
    const sv=$("#orgT3Save");if(sv)sv.onclick=saveOfficialTop3;
    const cl=$("#orgT3Clear");if(cl)cl.onclick=clearOfficialTop3;
  },0);
  if(players.length){
    players.forEach(p=>{
      const t=Store.myTop3(p.code);
      const row=el("div","org-prow");
      const info=el("div","op-info");
      const body=hasCompleteTop3(t)?`${esc(t.first)} / ${esc(t.second)} / ${esc(t.third)}`:"— no Top 3 —";
      info.innerHTML=`<div class="n">${esc(p.name)}</div><div class="op-code">${body}</div>`;
      row.appendChild(info);tPanel.appendChild(row);
    });
  }
  wrap.appendChild(tPanel);

  return wrap;
}

/* Organizer: publish / clear the official Top 3 podium. Team names come from
   the same top3Teams() list players picked from, so string matching in
   scoreTop3() (strict ===) is guaranteed to line up. */
async function saveOfficialTop3(){
  if(!isAdmin){toast("Organizer only");return;}
  const first=($("#orgT3First")||{}).value||"",second=($("#orgT3Second")||{}).value||"",third=($("#orgT3Third")||{}).value||"";
  const t={first,second,third};
  if(!hasCompleteTop3(t)){toast("Select all three official places");return;}
  if(!hasUniqueTop3(t)){toast("Each place must be a different team");return;}
  try{
    await Store.setTop3Result(first,second,third);
    toast("Official Top 3 published — points added to totals");
    renderApp();
  }catch(e){toast("Could not save: "+((e&&e.message)||e));}
}
async function clearOfficialTop3(){
  if(!isAdmin){toast("Organizer only");return;}
  if(!confirm("Clear the official Top 3 result? Everyone's Top 3 points will be removed from the totals until you set it again."))return;
  try{
    await Store.clearTop3Result();
    toast("Official Top 3 cleared");
    renderApp();
  }catch(e){toast("Could not clear: "+((e&&e.message)||e));}
}

/* Secret organizer entry: 3 taps/clicks on the hidden "lock" word within a
   short window opens the organizer prompt. No visible button anywhere. */
let _lockClicks=0,_lockTimer=null;
function attachSecretTrigger(node){
  const bump=(e)=>{
    e.preventDefault();e.stopPropagation();
    _lockClicks++;
    clearTimeout(_lockTimer);
    _lockTimer=setTimeout(()=>{_lockClicks=0;},1500);
    if(_lockClicks>=3){_lockClicks=0;clearTimeout(_lockTimer);toggleAdmin();}
  };
  node.addEventListener("click",bump);
}

/* Second security factor: organizer mode is only available to the ONE
   authorised account (login code hashes to CFG.organizerUserCodeHash), and only
   after entering the password that hashes to CFG.adminHash. Neither secret
   appears in the source in plaintext. NOTE: browser-side checks can always be
   bypassed by a determined user — real protection lives in Firestore rules. */
async function toggleAdmin(){
  if(isAdmin){isAdmin=false;sessionStorage.removeItem("egec_admin");if(activeTab==="org")activeTab="today";renderApp();return;}
  if(!(await isAuthorizedOrg())){toast("This account can't access organizer mode");return;}
  const code=prompt("Organizer code:");
  if(code==null)return;
  if(CFG.adminHash&&(await sha256hex(code))===CFG.adminHash){isAdmin=true;sessionStorage.setItem("egec_admin","1");activeTab="org";renderApp();toast("Organizer mode on");}
  else toast("Wrong organizer code");
}

/* ---------------- Countdown tick ---------------- */
function tick(){
  document.querySelectorAll("[data-countdown]").forEach(node=>{
    const m=allEffectiveMatches().find(x=>x.id===node.getAttribute("data-countdown"));if(!m)return;
    const ms=lockAt(m)-now();node.textContent=fmtCountdown(ms);
    node.classList.toggle("urgent",ms<=15*60000&&ms>0);
    if(ms<=0&&!node._r){node._r=true;setTimeout(()=>renderApp(),400);}
  });
  document.querySelectorAll("[data-top3-countdown]").forEach(node=>{
    const target=node.getAttribute("data-top3-countdown")==="open"?top3OpenAt():top3CloseAt();
    const ms=target-now();node.textContent=fmtCountdown(ms);
    if(ms<=0&&!node._r){node._r=true;setTimeout(()=>renderApp(),400);}
  });
}

/* ---------------- Refresh loop ---------------- */
let refreshing=false;
async function refresh(){
  if(refreshing)return;refreshing=true;
  const ae=document.activeElement;const typing=ae&&ae.tagName==="INPUT"&&ae.closest(".card,.org-row,.org-add");
  await loadMatches();
  if(!typing&&ME)renderApp();else if(!typing&&!ME)render();
  refreshing=false;
}

/* ---------------- Init ---------------- */
(async function(){
  document.title=(CFG.orgName||"EGEC")+" · World Cup Predictor";
  await loadMatches();
  await Store.init();
  if(ME&&!listFor("today").length)activeTab="upcoming";
  render();
  setInterval(tick,1000);
  setInterval(refresh,CFG.refreshMs||30000);
})();

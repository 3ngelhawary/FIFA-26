<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EGEC · World Cup Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{
    --bg:#05060c;
    --panel:#0c0e1a; --panel-2:#11142400; --card:#0b0d18; --card-2:#0e1122;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.16);
    --ink:#eef1ff; --muted:#8b90b5; --faint:#565c83;
    --cyan:#00e5ff; --magenta:#ff2e97; --purple:#b14eff;
    --win:#2bff88; --draw:#ffe600; --lose:#ff2d55;
    --radius:18px; --radius-sm:11px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(900px 480px at 82% -8%, rgba(255,46,151,.16), transparent 60%),
      radial-gradient(820px 460px at -8% 4%, rgba(0,229,255,.14), transparent 58%),
      radial-gradient(700px 700px at 50% 120%, rgba(177,78,255,.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--magenta);color:#fff}
  .wrap{max-width:940px;margin:0 auto;padding:0 16px 90px}
  .neon-cyan{color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,.55)}
  .neon-mag{color:var(--magenta);text-shadow:0 0 8px rgba(255,46,151,.55)}

  /* ===== Auth ===== */
  .auth{min-height:100vh;display:grid;place-items:center;padding:30px 16px}
  .auth-card{
    width:100%;max-width:420px;border:1px solid var(--line-2);border-radius:24px;
    background:linear-gradient(180deg,rgba(20,22,40,.85),rgba(10,11,22,.9));
    box-shadow:0 0 0 1px rgba(255,46,151,.08),0 30px 80px rgba(0,0,0,.6),0 0 60px rgba(0,229,255,.08);
    padding:30px 26px;backdrop-filter:blur(8px);
  }
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .bolt{
    width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:24px;
    background:linear-gradient(135deg,var(--magenta),var(--purple));
    box-shadow:0 0 24px rgba(255,46,151,.5);
  }
  .logo h1{font-family:"Oswald";font-weight:700;font-size:24px;margin:0;letter-spacing:.5px;line-height:1}
  .logo .s{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
  .seg{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:4px;margin:22px 0 18px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;
    padding:10px;border-radius:9px;cursor:pointer;font-size:14px;transition:.15s}
  .seg button.on{background:linear-gradient(135deg,var(--cyan),var(--magenta));color:#04060e;box-shadow:0 0 18px rgba(0,229,255,.35)}
  label.fld{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:0 0 7px}
  .input{
    width:100%;background:#070912;border:1px solid var(--line-2);color:var(--ink);border-radius:12px;
    padding:14px 15px;font-size:16px;font-family:inherit;outline:none;transition:.15s;
  }
  .input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.18)}
  .input.code{font-family:"Oswald";font-weight:700;letter-spacing:5px;text-transform:uppercase;text-align:center;font-size:22px}
  .btn{
    width:100%;margin-top:16px;border:0;border-radius:12px;cursor:pointer;font-family:"Oswald";font-weight:600;
    font-size:17px;letter-spacing:.5px;padding:14px;color:#04060e;
    background:linear-gradient(135deg,var(--cyan),var(--magenta));box-shadow:0 0 22px rgba(255,46,151,.35);transition:.15s;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line-2);box-shadow:none}
  .err{color:var(--lose);font-size:13px;margin-top:10px;min-height:18px;text-align:center}
  .hint-sm{color:var(--faint);font-size:12px;margin-top:14px;text-align:center;line-height:1.6}

  .spinner{width:34px;height:34px;border-radius:50%;margin:18px auto 0;
    border:3px solid rgba(255,255,255,.12);border-top-color:var(--cyan);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .setup-title{font-family:"Oswald";font-weight:600;font-size:20px;margin:18px 0 6px}
  .setup-lead{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 14px}
  .setup-steps{margin:0 0 14px;padding-left:20px;color:var(--ink);font-size:13.5px;line-height:1.8}
  .setup-steps li{margin-bottom:2px}
  .mono{font-family:"Oswald";letter-spacing:.4px;color:var(--cyan);background:rgba(0,229,255,.08);padding:1px 6px;border-radius:5px}
  pre.rules{background:#070912;border:1px solid var(--line-2);border-radius:11px;padding:12px;font-size:11.5px;line-height:1.5;
    color:#bfe9ff;overflow-x:auto;white-space:pre;margin:0 0 14px}
  .errd{color:var(--lose);font-size:12px;background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.3);
    border-radius:9px;padding:9px 11px;margin-bottom:12px;word-break:break-word}

  .code-reveal{text-align:center}
  .code-reveal .big-code{
    font-family:"Oswald";font-weight:700;font-size:40px;letter-spacing:8px;margin:14px 0 6px;
    color:var(--cyan);text-shadow:0 0 18px rgba(0,229,255,.6)
  }
  .copy-btn{border:1px solid var(--line-2);background:rgba(255,255,255,.04);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px}
  .warn{background:rgba(255,230,0,.08);border:1px solid rgba(255,230,0,.3);color:var(--draw);
    border-radius:12px;padding:11px 13px;font-size:13px;margin:16px 0;line-height:1.5}

  /* ===== Header ===== */
  header.app{position:sticky;top:0;z-index:40;backdrop-filter:blur(12px);
    background:linear-gradient(180deg,rgba(5,6,12,.92),rgba(5,6,12,.6));border-bottom:1px solid var(--line)}
  .head-inner{max-width:940px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .bolt{width:34px;height:34px;border-radius:10px;font-size:18px}
  .brand h1{font-family:"Oswald";font-weight:600;font-size:17px;margin:0;letter-spacing:.4px;line-height:1.05}
  .brand .s{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
  .head-spacer{flex:1}
  .me-chip{display:flex;align-items:center;gap:10px;border:1px solid var(--line-2);border-radius:999px;padding:5px 6px 5px 13px;background:rgba(255,255,255,.03)}
  .me-chip .nm{font-weight:700;font-size:13px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .me-chip .pts{font-family:"Oswald";font-weight:700;color:var(--cyan);font-size:16px;text-shadow:0 0 8px rgba(0,229,255,.5)}
  .me-chip .pts small{color:var(--muted);font-size:9px;letter-spacing:.5px;text-shadow:none}
  .icon-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--line-2);background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
  .icon-btn:hover{color:var(--ink);border-color:var(--magenta)}

  /* ===== Hero ===== */
  .hero{margin:20px 0 6px;border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;
    background:linear-gradient(120deg,rgba(255,46,151,.1),rgba(0,229,255,.07));position:relative}
  .hero:before{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 40px,transparent 40px 80px);pointer-events:none}
  .hero-in{position:relative;padding:16px 18px}
  .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--magenta);font-weight:700}
  .hero-cta{font-family:"Oswald";font-weight:600;font-size:clamp(19px,4.4vw,28px);margin:4px 0 2px;letter-spacing:.3px}
  .hero-clock{font-family:"Oswald";font-weight:700;font-variant-numeric:tabular-nums;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.55)}
  .hero-clock.urgent{color:var(--lose);text-shadow:0 0 12px rgba(255,45,85,.6)}
  .hero-sub{color:var(--muted);font-size:13px}
  .live-ticker{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .live-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.45);
    border-radius:999px;padding:5px 11px;font-size:12.5px}
  .live-pill .sc{font-family:"Oswald";font-weight:700}

  /* ===== Tabs ===== */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:18px 0 14px;position:sticky;top:58px;z-index:30;
    background:linear-gradient(180deg,var(--bg) 72%,transparent);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line-2);background:rgba(255,255,255,.02);color:var(--muted);
    padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
  .tab:hover{color:var(--ink)}
  .tab.active{color:#04060e;background:linear-gradient(135deg,var(--cyan),var(--magenta));border-color:transparent;box-shadow:0 0 16px rgba(0,229,255,.3)}
  .tab .badge{margin-left:6px;font-size:11px;opacity:.8}

  /* ===== Match card ===== */
  .card{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;
    background:linear-gradient(180deg,var(--card),var(--card-2));position:relative;transition:.2s}
  .card.live{border-color:rgba(255,45,85,.5);box-shadow:0 0 22px rgba(255,45,85,.14)}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .grp{font-family:"Oswald";letter-spacing:.5px;text-transform:uppercase}
  .status{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11.5px;letter-spacing:.6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .status.live{color:var(--lose)} .status.live .dot{background:var(--lose);animation:pulse 1.2s infinite}
  .status.ft{color:var(--win)} .status.ft .dot{background:var(--win)}
  .status.locked{color:var(--draw)} .status.locked .dot{background:var(--draw)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,85,.6)}70%{box-shadow:0 0 0 8px rgba(255,45,85,0)}100%{box-shadow:0 0 0 0 rgba(255,45,85,0)}}

  .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:18px 14px 10px}
  .team{display:flex;align-items:center;gap:11px;min-width:0}
  .team.away{justify-content:flex-end;text-align:right}
  .flag{width:34px;height:25px;border-radius:4px;object-fit:cover;flex:0 0 auto;border:1px solid rgba(255,255,255,.18);
    box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .flag-emo{font-size:28px;line-height:1;flex:0 0 auto}
  .tname{font-family:"Oswald";font-weight:600;font-size:18px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:92px}
  .score{font-family:"Oswald";font-weight:700;font-size:36px;font-variant-numeric:tabular-nums;line-height:1;display:flex;align-items:center;gap:6px}
  .score .sep{color:var(--faint)}
  .vs{font-family:"Oswald";font-size:15px;color:var(--faint);letter-spacing:3px}
  .ko{font-size:11px;color:var(--muted);text-align:center}
  /* result colors */
  .win .tname,.s-win{color:var(--win);text-shadow:0 0 10px rgba(43,255,136,.45)}
  .lose .tname,.s-lose{color:var(--lose);text-shadow:0 0 10px rgba(255,45,85,.4)}
  .draw .tname,.s-draw{color:var(--draw);text-shadow:0 0 10px rgba(255,230,0,.4)}

  /* prediction zone */
  .pred{padding:4px 15px 15px}
  .pred-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);text-align:center;margin-bottom:7px}
  .pred-row{display:flex;align-items:center;justify-content:center;gap:12px}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:11px;overflow:hidden;background:#070912}
  .stepper button{width:34px;height:40px;border:0;background:transparent;color:var(--ink);font-size:19px;cursor:pointer;font-family:"Oswald"}
  .stepper button:hover{background:rgba(0,229,255,.12);color:var(--cyan)}
  .stepper input{width:42px;height:40px;border:0;background:transparent;color:var(--cyan);text-align:center;
    font-family:"Oswald";font-weight:700;font-size:21px;outline:none;text-shadow:0 0 8px rgba(0,229,255,.5);
    border-left:1px solid var(--line);border-right:1px solid var(--line);-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .pred-mid{font-family:"Oswald";color:var(--faint);font-size:18px}
  .lock-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:11px;font-size:12.5px;color:var(--muted)}
  .lock-clock{font-family:"Oswald";font-weight:600;font-variant-numeric:tabular-nums;color:var(--draw)}
  .lock-clock.urgent{color:var(--lose);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.45}}
  .saved{color:var(--win);font-weight:700;opacity:0;transition:opacity .25s}
  .saved.show{opacity:1}
  .hint{text-align:center;color:var(--faint);font-size:11.5px;margin-top:8px}
  .locked-note{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12.5px;margin-top:6px}
  .locked-note b{font-family:"Oswald";color:var(--ink)}

  .result-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .yourpick{font-size:13px;color:var(--muted)} .yourpick b{color:var(--ink);font-family:"Oswald"}
  .pts-badge{font-family:"Oswald";font-weight:700;font-size:13px;border-radius:999px;padding:4px 11px}
  .pts-badge.hit{background:rgba(43,255,136,.14);color:var(--win);border:1px solid rgba(43,255,136,.45)}
  .pts-badge.part{background:rgba(255,230,0,.14);color:var(--draw);border:1px solid rgba(255,230,0,.45)}
  .pts-badge.miss{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}
  .pts-badge.none{background:transparent;color:var(--faint);border:1px dashed var(--line-2)}

  /* predictions reveal panel */
  .reveal{border-top:1px solid var(--line)}
  .reveal-btn{width:100%;background:transparent;border:0;color:var(--muted);cursor:pointer;font-family:inherit;
    font-size:12.5px;font-weight:700;padding:11px 15px;display:flex;align-items:center;justify-content:center;gap:8px}
  .reveal-btn:hover{color:var(--cyan)}
  .reveal-btn .chev{transition:transform .2s} .reveal-btn.open .chev{transform:rotate(90deg)}
  .reveal-panel{padding:0 13px 13px}
  .reveal-cap{font-size:11px;color:var(--faint);text-align:center;padding:2px 0 9px}
  .pick-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;font-size:13px}
  .pick-row:nth-child(odd){background:rgba(255,255,255,.025)}
  .pick-row.you{background:rgba(0,229,255,.08)}
  .pick-row .pn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
  .pick-row .pp{font-family:"Oswald";font-weight:700;font-size:15px;color:var(--ink)}
  .pick-row .hidden-sc{color:var(--faint);font-size:12px;font-style:italic}
  .tag{font-size:9.5px;border-radius:5px;padding:1px 6px;font-weight:700;letter-spacing:.4px}
  .tag.you{background:var(--cyan);color:#04060e} .tag.me-tag{background:var(--magenta);color:#fff}

  /* ===== Roster / Leaderboard ===== */
  .panel{border:1px solid var(--line-2);border-radius:var(--radius);overflow:hidden;background:linear-gradient(180deg,var(--card),var(--card-2))}
  .panel h2{font-family:"Oswald";font-weight:600;margin:0;padding:15px 17px;font-size:17px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between}
  .panel h2 .meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:"Inter";font-weight:700}
  .lb-row{display:grid;grid-template-columns:36px 1fr auto auto;gap:12px;align-items:center;padding:12px 17px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:0}
  .lb-row.me{background:rgba(255,46,151,.07)}
  .rank{font-family:"Oswald";font-weight:700;font-size:18px;color:var(--muted);text-align:center}
  .rank.g1{color:var(--draw);text-shadow:0 0 10px rgba(255,230,0,.5)} .rank.g2{color:#d6def0} .rank.g3{color:#ff9d5c}
  .lb-name{font-weight:700;display:flex;align-items:center;gap:8px;min-width:0}
  .lb-name span.n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-sub{font-size:12px;color:var(--muted);white-space:nowrap}
  .lb-pts{font-family:"Oswald";font-weight:700;font-size:20px;color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,.45);text-align:right;min-width:42px}

  .roster-row{display:flex;align-items:center;gap:12px;padding:12px 17px;border-bottom:1px solid var(--line)}
  .roster-row:last-child{border-bottom:0}
  .av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:"Oswald";font-weight:700;
    background:linear-gradient(135deg,rgba(0,229,255,.25),rgba(255,46,151,.25));color:var(--ink);flex:0 0 auto}
  .roster-row .info{flex:1;min-width:0}
  .roster-row .info .n{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .roster-row .info .s{font-size:12px;color:var(--muted)}
  .mycode{font-family:"Oswald";letter-spacing:2px;color:var(--cyan)}

  /* ===== Organizer ===== */
  .org-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 15px;border-bottom:1px solid var(--line)}
  .org-row .ot{font-family:"Oswald";font-size:14px;min-width:0}
  .org-controls{display:flex;align-items:center;gap:6px}
  .mini{width:46px;height:36px;background:#070912;border:1px solid var(--line-2);color:var(--cyan);border-radius:8px;
    text-align:center;font-family:"Oswald";font-weight:700;font-size:17px;outline:none}
  .mini:focus{border-color:var(--cyan)}
  .org-save{border:1px solid var(--line-2);background:rgba(43,255,136,.1);color:var(--win);border-radius:8px;
    padding:8px 12px;font-family:inherit;font-weight:700;cursor:pointer;font-size:12.5px}
  .org-save:hover{background:rgba(43,255,136,.2)}
  .org-add{display:flex;gap:8px;padding:14px 15px;border-bottom:1px solid var(--line)}
  .org-add input{flex:1;background:#070912;border:1px solid var(--line-2);color:var(--ink);border-radius:10px;padding:11px;font-family:inherit;outline:none}

  .org-prow{display:flex;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid var(--line)}
  .org-prow:last-child{border-bottom:0}
  .op-info{flex:1;min-width:0}
  .op-info .n{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .op-code{font-size:12px;color:var(--muted);margin-top:2px}
  .op-actions{display:flex;align-items:center;gap:7px;flex:0 0 auto}
  .op-copy{width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);background:rgba(0,229,255,.08);color:var(--cyan);cursor:pointer;font-size:15px}
  .op-copy:hover{background:rgba(0,229,255,.2)}

  .empty{text-align:center;color:var(--muted);padding:44px 20px;border:1px dashed var(--line-2);border-radius:var(--radius)}
  .empty .big{font-family:"Oswald";font-size:20px;color:var(--ink);margin-bottom:6px}

  /* local-mode banner */
  .banner{display:flex;gap:11px;align-items:flex-start;border:1px solid rgba(255,230,0,.35);background:rgba(255,230,0,.07);
    color:#ffe9a3;border-radius:14px;padding:12px 14px;margin:18px 0 2px;font-size:13px;line-height:1.5}

<script>
/* =========================================================================
   EGEC World Cup Predictor — accounts, roster, neon UI (vanilla JS)
   ========================================================================= */

/* ---- Team -> ISO2 (for real flag images via flagcdn) ---- */
const ISO = {

/* ---- Embedded fallback fixtures (used if matches.json can't be fetched) ---- */
const EMBEDDED={matches:[
{id:"g20-ned-swe",group:"F",home:"Netherlands",away:"Sweden",homeFlag:"🇳🇱",awayFlag:"🇸🇪",kickoff:"2026-06-20T16:00:00Z",venue:"Houston",status:"finished",homeScore:5,awayScore:1},
{id:"g20-ger-civ",group:"E",home:"Germany",away:"Ivory Coast",homeFlag:"🇩🇪",awayFlag:"🇨🇮",kickoff:"2026-06-20T20:00:00Z",venue:"MetLife",status:"finished",homeScore:2,awayScore:1},
{id:"g20-ecu-cuw",group:"E",home:"Ecuador",away:"Curaçao",homeFlag:"🇪🇨",awayFlag:"🇨🇼",kickoff:"2026-06-20T23:00:00Z",venue:"Philadelphia",status:"finished",homeScore:0,awayScore:0},
{id:"g21-tun-jpn",group:"F",home:"Tunisia",away:"Japan",homeFlag:"🇹🇳",awayFlag:"🇯🇵",kickoff:"2026-06-21T17:00:00Z",venue:"Kansas City",status:"finished",homeScore:0,awayScore:4},
{id:"g21-esp-ksa",group:"H",home:"Spain",away:"Saudi Arabia",homeFlag:"🇪🇸",awayFlag:"🇸🇦",kickoff:"2026-06-21T19:00:00Z",venue:"Atlanta",status:"finished",homeScore:4,awayScore:0},
{id:"g21-bel-irn",group:"G",home:"Belgium",away:"IR Iran",homeFlag:"🇧🇪",awayFlag:"🇮🇷",kickoff:"2026-06-21T21:00:00Z",venue:"Los Angeles",status:"finished",homeScore:1,awayScore:1},
{id:"g21-uru-cpv",group:"H",home:"Uruguay",away:"Cabo Verde",homeFlag:"🇺🇾",awayFlag:"🇨🇻",kickoff:"2026-06-21T23:00:00Z",venue:"Miami",status:"finished",homeScore:2,awayScore:2},
{id:"g21-egy-nzl",group:"G",home:"Egypt",away:"New Zealand",homeFlag:"🇪🇬",awayFlag:"🇳🇿",kickoff:"2026-06-22T01:00:00Z",venue:"Vancouver",status:"finished",homeScore:3,awayScore:1},
{id:"g22-arg-aut",group:"J",home:"Argentina",away:"Austria",homeFlag:"🇦🇷",awayFlag:"🇦🇹",kickoff:"2026-06-22T17:00:00Z",venue:"Arlington",status:"scheduled",homeScore:null,awayScore:null},
{id:"g22-fra-irq",group:"I",home:"France",away:"Iraq",homeFlag:"🇫🇷",awayFlag:"🇮🇶",kickoff:"2026-06-22T21:00:00Z",venue:"Philadelphia",status:"scheduled",homeScore:null,awayScore:null},
{id:"g22-nor-sen",group:"I",home:"Norway",away:"Senegal",homeFlag:"🇳🇴",awayFlag:"🇸🇳",kickoff:"2026-06-23T00:00:00Z",venue:"New York/NJ",status:"scheduled",homeScore:null,awayScore:null},
{id:"g22-jor-alg",group:"J",home:"Jordan",away:"Algeria",homeFlag:"🇯🇴",awayFlag:"🇩🇿",kickoff:"2026-06-23T03:00:00Z",venue:"SF Bay Area",status:"scheduled",homeScore:null,awayScore:null},
{id:"g23-por-uzb",group:"K",home:"Portugal",away:"Uzbekistan",homeFlag:"🇵🇹",awayFlag:"🇺🇿",kickoff:"2026-06-23T17:00:00Z",venue:"Houston",status:"scheduled",homeScore:null,awayScore:null},
{id:"g23-eng-gha",group:"L",home:"England",away:"Ghana",homeFlag:"🏴",awayFlag:"🇬🇭",kickoff:"2026-06-23T20:00:00Z",venue:"Boston",status:"scheduled",homeScore:null,awayScore:null},
{id:"g23-pan-cro",group:"L",home:"Panama",away:"Croatia",homeFlag:"🇵🇦",awayFlag:"🇭🇷",kickoff:"2026-06-23T23:00:00Z",venue:"Toronto",status:"scheduled",homeScore:null,awayScore:null},
{id:"g23-col-cod",group:"K",home:"Colombia",away:"Congo DR",homeFlag:"🇨🇴",awayFlag:"🇨🇩",kickoff:"2026-06-24T02:00:00Z",venue:"Guadalajara",status:"scheduled",homeScore:null,awayScore:null},
{id:"g24-sui-can",group:"B",home:"Switzerland",away:"Canada",homeFlag:"🇨🇭",awayFlag:"🇨🇦",kickoff:"2026-06-24T19:00:00Z",venue:"Vancouver",status:"scheduled",homeScore:null,awayScore:null},
{id:"g24-sco-bra",group:"C",home:"Scotland",away:"Brazil",homeFlag:"🏴",awayFlag:"🇧🇷",kickoff:"2026-06-24T22:00:00Z",venue:"Miami",status:"scheduled",homeScore:null,awayScore:null},
{id:"g26-egy-irn",group:"G",home:"Egypt",away:"IR Iran",homeFlag:"🇪🇬",awayFlag:"🇮🇷",kickoff:"2026-06-27T03:00:00Z",venue:"Seattle",status:"scheduled",homeScore:null,awayScore:null},
{id:"g26-nzl-bel",group:"G",home:"New Zealand",away:"Belgium",homeFlag:"🇳🇿",awayFlag:"🇧🇪",kickoff:"2026-06-27T03:00:00Z",venue:"Vancouver",status:"scheduled",homeScore:null,awayScore:null}
]};

const DEFAULTS={orgName:"EGEC",seasonLabel:"World Cup 2026",lockOffsetMinutes:60,
  scoring:{exactScore:5,correctOutcome:3,correctGoalsBonus:1},adminCode:"EGEC2026",
  liveScores:{apiToken:"",competitionId:"WC"},storage:{mode:"local",firebase:{}},refreshMs:30000};
const CFG=Object.assign({},DEFAULTS,window.CONFIG||{});
CFG.scoring=Object.assign({},DEFAULTS.scoring,(window.CONFIG&&window.CONFIG.scoring)||{});
CFG.storage=Object.assign({},DEFAULTS.storage,(window.CONFIG&&window.CONFIG.storage)||{});

/* ---------------- State ---------------- */
let MATCHES=[];
let SESSION=localStorage.getItem("egec_session")||"";
let ME=null;                  // {name, code}
let isAdmin=sessionStorage.getItem("egec_admin")==="1";
let activeTab="today";
let authMode="register";
let savedTimer=null;

/* ---------------- Storage (shared / Firebase only) ---------------- */
const Store={
  ready:false, error:"", errDetail:"",
  db:null, fs:null,
  cache:{players:{},preds:{},results:{}},
  loaded:{players:false,preds:false,results:false},

  async init(){
    const cfg=CFG.storage.firebase||{};
    if(!cfg.apiKey||!cfg.projectId){ this.error="config"; return; }
    try{
      const a=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const f=await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app=a.initializeApp(cfg); this.db=f.getFirestore(app); this.fs=f;
      this.ready=true;
      const sub=(col,key)=>f.onSnapshot(f.collection(this.db,col),
        s=>{ this.cache[key]={}; s.forEach(d=>this.cache[key][d.id]=d.data()); this.loaded[key]=true; render(); },
        err=>{ this.error="rules"; this.errDetail=err.message||String(err); render(); });
      sub("players","players"); sub("predictions","preds"); sub("results","results");
    }catch(e){ this.error="init"; this.errDetail=(e&&e.message)||String(e); }
  },

  players(){return this.cache.players;},
  predsAll(){return this.cache.preds;},
  resultsAll(){return this.cache.results;},
  getByCode(code){const p=this.players();return p[code]?{name:p[code].name,code}:null;},

  async addPlayer(name){
    let code; do{code=genCode();}while(this.players()[code]);
    const rec={name,code,createdAt:Date.now()};
    await this.fs.setDoc(this.fs.doc(this.db,"players",code),rec);
    return code;
  },

  myPicks(code){const all=this.predsAll();return (all[code]&&all[code].picks)||{};},

  async savePick(code,name,matchId,h,a){
    const cur=(this.cache.preds[code]&&this.cache.preds[code].picks)||{};
    cur[matchId]={h,a};
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,picks:cur},{merge:true});
  },

  async setResult(matchId,h,a,status){
    await this.fs.setDoc(this.fs.doc(this.db,"results",matchId),{homeScore:h,awayScore:a,status});
  },

  async deletePick(code,name,matchId){
    const cur=Object.assign({},(this.cache.preds[code]&&this.cache.preds[code].picks)||{});
    delete cur[matchId];
    await this.fs.setDoc(this.fs.doc(this.db,"predictions",code),{name,picks:cur});
  },

  async deletePlayer(code){
    await this.fs.deleteDoc(this.fs.doc(this.db,"players",code));
    try{ await this.fs.deleteDoc(this.fs.doc(this.db,"predictions",code)); }catch(e){}
  }
};

function genCode(){
  const A="ABCDEFGHJKMNPQRSTUVWXYZ23456789";let s="";
  for(let i=0;i<6;i++)s+=A[Math.floor(Math.random()*A.length)];
  return s;
}

/* ---------------- Effective match (apply organizer results) ---------------- */
function eff(m){
  const r=Store.resultsAll()[m.id];
  if(!r)return m;
  return Object.assign({},m,{homeScore:r.homeScore,awayScore:r.awayScore,status:r.status||m.status});
}

/* ---------------- Time / state ---------------- */
const now=()=>Date.now();
const ko=m=>new Date(m.kickoff).getTime();
const lockAt=m=>ko(m)-CFG.lockOffsetMinutes*60000;
function liveState(m){if(m.status==="finished")return"finished";if(m.status==="live")return"live";if(now()>=ko(m))return"live";return"upcoming";}
const isLocked=m=>liveState(m)!=="upcoming"||now()>=lockAt(m);
function outcome(m){if(m.homeScore==null||m.awayScore==null)return null;if(m.homeScore>m.awayScore)return"home";if(m.awayScore>m.homeScore)return"away";return"draw";}

function fmtCountdown(ms){if(ms<=0)return"00:00:00";const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),mi=Math.floor((s%3600)/60),se=s%60,p=n=>String(n).padStart(2,"0");return(d>0?d+"d ":"")+p(h)+":"+p(mi)+":"+p(se);}
function fmtKO(m){return new Date(m.kickoff).toLocaleString(undefined,{weekday:"short",hour:"2-digit",minute:"2-digit"});}

/* ---------------- Scoring ---------------- */
function scorePick(pick,m){
  if(m.status!=="finished"||!pick||pick.h==null)return{pts:0,kind:"none"};
  const ph=+pick.h,pa=+pick.a,fh=m.homeScore,fa=m.awayScore;
  if(ph===fh&&pa===fa)return{pts:CFG.scoring.exactScore,kind:"hit"};
  let pts=0;if(Math.sign(ph-pa)===Math.sign(fh-fa))pts+=CFG.scoring.correctOutcome;
  if(ph===fh)pts+=CFG.scoring.correctGoalsBonus;if(pa===fa)pts+=CFG.scoring.correctGoalsBonus;
  return{pts,kind:pts>0?"part":"miss"};
}
function totalFor(picks){let total=0,played=0;MATCHES.forEach(mm=>{const m=eff(mm);if(m.status==="finished"&&picks[m.id]&&picks[m.id].h!=null){total+=scorePick(picks[m.id],m).pts;played++;}});return{total,played};}

/* predictors of a match: names always; scores only after lock (or your own) */
function predictorsFor(mm){
  const m=eff(mm),locked=isLocked(m),preds=Store.predsAll(),out=[];
  Object.entries(preds).forEach(([code,d])=>{
    const pk=d.picks&&d.picks[m.id];if(!pk||pk.h==null)return;
    const isYou=ME&&code===ME.code;
    out.push({name:d.name||"?",code,pick:pk,isYou,reveal:locked||isYou,score:m.status==="finished"?scorePick(pk,m):null});
  });
  out.sort((a,b)=>(b.isYou-a.isYou)||((b.score?b.score.pts:0)-(a.score?a.score.pts:0))||a.name.localeCompare(b.name));
  return out;
}

/* ---------------- DOM helpers ---------------- */
const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function flagEl(name,emoji){
  const iso=ISO[name];
  if(iso){const img=document.createElement("img");img.className="flag";img.alt=name;img.loading="lazy";
    img.src="https://flagcdn.com/w80/"+iso+".png";
    img.onerror=()=>{const s=el("span","flag-emo");s.textContent=emoji||"🏳️";img.replaceWith(s);};
    return img;}
  const s=el("span","flag-emo");s.textContent=emoji||"🏳️";return s;
}

/* ---------------- Data loading ---------------- */
async function loadMatches(){
  try{const r=await fetch("matches.json",{cache:"no-store"});if(r.ok){const j=await r.json();if(j&&Array.isArray(j.matches))MATCHES=j.matches;else MATCHES=EMBEDDED.matches;}else MATCHES=EMBEDDED.matches;}
  catch(e){MATCHES=EMBEDDED.matches;}
  await mergeLive();
}
async function mergeLive(){
  const ls=CFG.liveScores;if(!ls||!ls.apiToken)return;
  try{const r=await fetch(`https://api.football-data.org/v4/competitions/${ls.competitionId}/matches`,{headers:{"X-Auth-Token":ls.apiToken}});
    if(!r.ok)return;const data=await r.json();const by={};(data.matches||[]).forEach(am=>by[(am.homeTeam.name+"|"+am.awayTeam.name).toLowerCase()]=am);
    MATCHES.forEach(m=>{const am=by[(m.home+"|"+m.away).toLowerCase()];if(!am)return;
      if(am.status==="FINISHED")m.status="finished";else if(am.status==="IN_PLAY"||am.status==="PAUSED")m.status="live";
      if(am.score&&am.score.fullTime){if(am.score.fullTime.home!=null)m.homeScore=am.score.fullTime.home;if(am.score.fullTime.away!=null)m.awayScore=am.score.fullTime.away;}});
  }catch(e){}
}

/* =========================================================================
   RENDER
   ========================================================================= */
function render(){
  if(Store.error){ renderSetup(); return; }
  if(!Store.ready){ renderLoading("Connecting to the shared game…"); return; }
  if(SESSION&&!ME){
    if(!Store.loaded.players){ renderLoading("Loading your account…"); return; }
    const p=Store.getByCode(SESSION);
    if(p) ME=p; else { SESSION=""; localStorage.removeItem("egec_session"); }
  }
  if(!ME){renderAuth();return;}
  renderApp();
}

function renderLoading(msg){
  $("#root").innerHTML=`
  <div class="auth"><div class="auth-card" style="text-align:center">
    <div class="logo" style="justify-content:center"><div class="bolt">⚡</div></div>
    <div class="spinner"></div>
    <div style="color:var(--muted);margin-top:14px;font-size:14px">${esc(msg||"Loading…")}</div>
  </div></div>`;
}

function renderSetup(){
  const e=Store.error;
  let title,lead,extra="";
  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{doc=**} { allow read, write: if true; }
  }
}`;
  if(e==="config"){
    title="Add your Firebase config";
    lead="This app runs in shared mode only, so it needs a Firebase project to store accounts, picks and the leaderboard.";
    extra=`<ol class="setup-steps">
      <li>Create a free project at <span class="mono">console.firebase.google.com</span> and add a <b>Web app</b>.</li>
      <li>Enable <b>Firestore Database</b>.</li>
      <li>Copy the web config into <span class="mono">config.js</span> → <span class="mono">storage.firebase</span> (all six fields).</li>
      <li>Set Firestore <b>Rules</b> to allow access, then reload:</li>
    </ol><pre class="rules">${esc(rules)}</pre>`;
  }else if(e==="rules"){
    title="Firestore is blocking access";
    lead="Firebase connected, but its security rules are denying reads/writes. Open Firebase console → Firestore → Rules, paste the rules below, Publish, then reload.";
    extra=`<pre class="rules">${esc(rules)}</pre><div class="errd">${esc(Store.errDetail||"")}</div>`;
  }else{
    title="Couldn't reach the shared game";
    lead="Firebase failed to initialise. Double-check the config values in config.js, then reload.";
    extra=`<div class="errd">${esc(Store.errDetail||"")}</div>`;
  }
  $("#root").innerHTML=`
  <div class="auth"><div class="auth-card">
    <div class="logo"><div class="bolt">⚡</div>
      <div><h1>${esc(CFG.orgName)} <span class="neon-mag">Predictor</span></h1>
      <div class="s">Shared mode setup</div></div></div>
    <div class="setup-title">${title}</div>
    <p class="setup-lead">${lead}</p>
    ${extra}
    <button class="btn" id="retryBtn">Reload</button>
  </div></div>`;
  $("#retryBtn").onclick=()=>location.reload();
}

/* ---- Auth ---- */
function renderAuth(){
  const root=$("#root");
  root.innerHTML=`
  <div class="auth"><div class="auth-card" id="ac"></div></div>`;
  drawAuth();
}
function drawAuth(){
  const ac=$("#ac");
  ac.innerHTML=`
    <div class="logo"><div class="bolt">⚡</div>
      <div><h1>${esc(CFG.orgName)} <span class="neon-mag">Predictor</span></h1>
      <div class="s">${esc(CFG.seasonLabel)}</div></div></div>
    <div class="seg">
      <button id="segReg" class="${authMode==="register"?"on":""}">Register</button>
      <button id="segLog" class="${authMode==="login"?"on":""}">Log in</button>
    </div>
    <div id="authBody"></div>`;
  $("#segReg").onclick=()=>{authMode="register";drawAuth();};
  $("#segLog").onclick=()=>{authMode="login";drawAuth();};
  const body=$("#authBody");
  if(authMode==="register"){
    body.innerHTML=`
      <label class="fld">Your name</label>
      <input id="regName" class="input" placeholder="e.g. Mohamed Salah" autocomplete="off" />
      <button class="btn" id="regBtn">Create my code</button>
      <div class="err" id="regErr"></div>
      <div class="hint-sm">You'll get a unique 6-character code. Save it — it's how you log in from any device.</div>`;
    $("#regBtn").onclick=doRegister;
    $("#regName").addEventListener("keydown",e=>{if(e.key==="Enter")doRegister();});
    setTimeout(()=>$("#regName").focus(),50);
  }else{
    body.innerHTML=`
      <label class="fld">Your login code</label>
      <input id="logCode" class="input code" placeholder="● ● ● ● ● ●" maxlength="6" autocomplete="off" />
      <button class="btn" id="logBtn">Enter</button>
      <div class="err" id="logErr"></div>
      <div class="hint-sm">Lost your code? Ask your organizer — they can find you in the Players list.</div>`;
    const inp=$("#logCode");
    inp.addEventListener("input",()=>inp.value=inp.value.toUpperCase().replace(/[^A-Z0-9]/g,""));
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
    $("#logBtn").onclick=doLogin;
    setTimeout(()=>inp.focus(),50);
  }
}
async function doRegister(){
  const name=$("#regName").value.trim();
  if(name.length<2){$("#regErr").textContent="Enter your name (at least 2 letters).";return;}
  $("#regBtn").disabled=true;
  const code=await Store.addPlayer(name);
  ME={name,code};SESSION=code;localStorage.setItem("egec_session",code);
  showCodeReveal(name,code);
}
function showCodeReveal(name,code){
  const ac=$("#ac");

async function doLogin(){
  const code=$("#logCode").value.trim().toUpperCase();
  if(code.length<6){$("#logErr").textContent="Enter your 6-character code.";return;}
  const p=Store.getByCode(code);
  if(!p){$("#logErr").textContent="No player found with that code.";return;}
  ME=p;SESSION=code;localStorage.setItem("egec_session",code);render();
}
function logout(){ME=null;SESSION="";localStorage.removeItem("egec_session");isAdmin=false;sessionStorage.removeItem("egec_admin");activeTab="today";render();}

/* ---- App shell ---- */
const TABS=[{id:"today",label:"Today"},{id:"upcoming",label:"Upcoming"},{id:"finished",label:"Finished"},{id:"mine",label:"My Picks"},{id:"players",label:"Players"},{id:"board",label:"Leaderboard"}];
function startToday(){const d=new Date();d.setHours(0,0,0,0);return d.getTime();}
function endToday(){const d=new Date();d.setHours(23,59,59,999);return d.getTime();}
function listFor(tab){
  const arr=MATCHES.map(eff).sort((a,b)=>ko(a)-ko(b));
  if(tab==="today")return arr.filter(m=>liveState(m)==="live"||(ko(m)>=startToday()&&ko(m)<=endToday()));
  if(tab==="upcoming")return arr.filter(m=>liveState(m)!=="finished");
  if(tab==="finished")return arr.filter(m=>m.status==="finished").reverse();
  return arr;
}

function renderApp(){
  const root=$("#root");
  const myPicks=Store.myPicks(ME.code);const mine=totalFor(myPicks);
  const tabs=isAdmin?TABS.concat([{id:"org",label:"⚙ Organizer"}]):TABS;

  root.innerHTML=`
  <header class="app"><div class="head-inner">
    <div class="brand"><div class="bolt">⚡</div>
      <div><h1>${esc(CFG.orgName)} Predictor</h1><div class="s">${esc(CFG.seasonLabel)}</div></div></div>
    <div class="head-spacer"></div>
    <div class="me-chip">
      <span class="nm">${esc(ME.name)}</span>
      <span class="pts">${mine.total}<small> PTS</small></span>
      <button class="icon-btn" id="logoutBtn" title="Log out">⎋</button>
    </div>
  </div></header>
  <div class="wrap">
    <section class="hero" id="hero" style="display:none"><div class="hero-in" id="heroIn"></div></section>
    <nav class="tabs" id="tabs"></nav>
    <main id="view"></main>
    <div class="foot">
      <div class="scoring-key">
        <span><b>${CFG.scoring.exactScore}</b> exact</span>
        <span><b>${CFG.scoring.correctOutcome}</b> result</span>
        <span><b>+${CFG.scoring.correctGoalsBonus}</b> per exact goals</span>
      </div>
      <div style="margin-top:9px">Picks lock <b>${CFG.lockOffsetMinutes} min</b> before kickoff · Shared across all devices</div>
      <div style="margin-top:7px">${isAdmin?'Organizer mode is on. ':''}<button class="link" id="orgLink">${isAdmin?"Exit organizer":"Organizer login"}</button></div>
    </div>
  </div>`;

  $("#logoutBtn").onclick=logout;
  $("#orgLink").onclick=toggleAdmin;

  const tabsEl=$("#tabs");
  tabs.forEach(t=>{
    const b=el("button","tab"+(t.id===activeTab?" active":""));
    b.textContent=t.label;
    if(t.id==="today"){const n=listFor("today").length;if(n){const s=el("span","badge");s.textContent=n;b.appendChild(s);}}
    b.onclick=()=>{activeTab=t.id;renderApp();};
    tabsEl.appendChild(b);
  });

  renderHero();
  const view=$("#view");
  if(activeTab==="board"){view.appendChild(renderBoard());return;}
  if(activeTab==="players"){view.appendChild(renderRoster());return;}
  if(activeTab==="org"){view.appendChild(renderOrg());return;}
  if(activeTab==="mine"){view.appendChild(renderMyPicks());tick();return;}

  const list=listFor(activeTab);
  if(!list.length){view.appendChild(emptyState(activeTab));return;}
  list.forEach(m=>view.appendChild(renderCard(m)));
  tick();
}

function emptyState(tab){
  const e=el("div","empty");
  const M={today:["No matches today","Check Upcoming and get your picks in early."],
    upcoming:["All caught up","No upcoming fixtures loaded."],
    finished:["Nothing finished yet","Results appear here once matches end."]}[tab]||["Nothing here",""];
  e.innerHTML=`<div class="big">${M[0]}</div><div>${M[1]}</div>`;return e;
}

function renderHero(){
  const hero=$("#hero"),box=$("#heroIn");
  const live=MATCHES.map(eff).filter(m=>liveState(m)==="live");
  const next=MATCHES.map(eff).filter(m=>liveState(m)==="upcoming"&&now()<lockAt(m)).sort((a,b)=>lockAt(a)-lockAt(b))[0];
  if(!live.length&&!next){hero.style.display="none";return;}
  hero.style.display="";box.innerHTML="";
  if(next){
    const has=Store.myPicks(ME.code)[next.id]&&Store.myPicks(ME.code)[next.id].h!=null;
    box.innerHTML=`<div class="eyebrow">${has?"Pick is in — change it before lock":"Get your pick in"}</div>
      <div class="hero-cta">${esc(next.home)} <span class="neon-cyan">v</span> ${esc(next.away)} · <span class="hero-clock" data-countdown="${next.id}">--:--:--</span></div>
      <div class="hero-sub">${has?"You can edit your scoreline until picks lock.":"Predict the scoreline before the countdown hits zero."}</div>`;
  }else{
    box.innerHTML=`<div class="eyebrow neon-mag">Live now</div><div class="hero-cta">Matches in progress</div>`;
  }
  if(live.length){
    const t=el("div","live-ticker");
    live.forEach(m=>{const p=el("span","live-pill");p.innerHTML=`<span class="dot" style="background:var(--lose)"></span>${esc(m.home)} <span class="sc">${m.homeScore??0}-${m.awayScore??0}</span> ${esc(m.away)}`;t.appendChild(p);});
    box.appendChild(t);
  }
}

function renderCard(m){
  const state=liveState(m),locked=isLocked(m),pick=Store.myPicks(ME.code)[m.id],out=outcome(m);
  const card=el("div","card"+(state==="live"?" live":""));

  const head=el("div","card-head");
  const grp=el("span","grp");grp.textContent="Group "+m.group+(m.venue?" · "+m.venue:"");
  const st=el("span","status "+(state==="live"?"live":state==="finished"?"ft":locked?"locked":""));
  st.innerHTML=`<span class="dot"></span>${state==="live"?"LIVE":state==="finished"?"FULL TIME":locked?"LOCKED":"UPCOMING"}`;
  head.appendChild(grp);head.appendChild(st);card.appendChild(head);

  // result colour classes
  const hC=out==="home"?"win":out==="draw"?"draw":out?"lose":"";
  const aC=out==="away"?"win":out==="draw"?"draw":out?"lose":"";

  const sb=el("div","scoreboard");
  const home=el("div","team home "+hC);
  home.appendChild(flagEl(m.home,m.homeFlag));
  const hn=el("span","tname");hn.textContent=m.home;home.appendChild(hn);
  const center=el("div","center");
  if(state==="upcoming"){center.innerHTML=`<div class="vs">VS</div><div class="ko">${fmtKO(m)}</div>`;}
  else{center.innerHTML=`<div class="score"><span class="${out==='home'?'s-win':out==='draw'?'s-draw':out?'s-lose':''}">${m.homeScore??0}</span><span class="sep">-</span><span class="${out==='away'?'s-win':out==='draw'?'s-draw':out?'s-lose':''}">${m.awayScore??0}</span></div>`;}
  const away=el("div","team away "+aC);
  const an=el("span","tname");an.textContent=m.away;away.appendChild(an);
  away.appendChild(flagEl(m.away,m.awayFlag));
  sb.appendChild(home);sb.appendChild(center);sb.appendChild(away);card.appendChild(sb);

  const pred=el("div","pred");
  if(m.status==="finished"){
    const sc=scorePick(pick,m);const line=el("div","result-line");
    const yp=el("div","yourpick");yp.innerHTML=pick&&pick.h!=null?`Your pick: <b>${pick.h}-${pick.a}</b>`:`<span style="color:var(--faint)">No pick made</span>`;
    const b=el("span","pts-badge "+sc.kind);b.textContent=sc.kind==="none"?"—":sc.kind==="hit"?"Exact! +"+sc.pts:sc.pts>0?"+"+sc.pts+" pts":"0 pts";
    line.appendChild(yp);line.appendChild(b);pred.appendChild(line);
  }else if(locked){
    const note=el("div","locked-note");
    note.innerHTML=pick&&pick.h!=null?`<span class="status locked"><span class="dot"></span></span> Picks closed · your pick <b>${pick.h}-${pick.a}</b>`:`<span class="status locked"><span class="dot"></span></span> Picks closed — no pick made`;
    pred.appendChild(note);
  }else{
    const label=el("div","pred-label");label.textContent="Your scoreline prediction";pred.appendChild(label);
    const row=el("div","pred-row");
    row.appendChild(stepper(m,"h",pick?pick.h:""));
    const mid=el("span","pred-mid");mid.textContent="–";row.appendChild(mid);
    row.appendChild(stepper(m,"a",pick?pick.a:""));pred.appendChild(row);
    const lock=el("div","lock-row");
    lock.innerHTML=`Locks in <span class="lock-clock" data-countdown="${m.id}">--:--:--</span> <span class="saved" data-saved="${m.id}">Saved ✓</span>`;
    pred.appendChild(lock);
    const hint=el("div","hint");hint.textContent="🔒 Colleagues see your name now, but your score only after lock.";pred.appendChild(hint);
  }
  card.appendChild(pred);

  // predictors panel
  const people=predictorsFor(m);
  if(people.length){
    const reveal=el("div","reveal");
    const btn=el("button","reveal-btn");btn.type="button";
    btn.innerHTML=`<span>👥 ${locked?"Predictions":"Predicted by"} (${people.length})</span><span class="chev">›</span>`;
    const panel=el("div","reveal-panel");panel.style.display="none";
    const cap=el("div","reveal-cap");cap.textContent=locked?"Scores revealed — picks are locked.":"Names only. Scores reveal when picks lock.";
    panel.appendChild(cap);
    people.forEach(p=>{
      const r=el("div","pick-row"+(p.isYou?" you":""));
      let right="";
      if(p.reveal){
        if(p.score){const cls=p.score.kind==="hit"?"hit":p.score.kind==="part"?"part":"miss";
          right=`<span class="pp">${p.pick.h}-${p.pick.a}</span><span class="pts-badge ${cls}" style="font-size:11px;padding:2px 8px">${p.score.kind==="hit"?"+"+p.score.pts:p.score.pts>0?"+"+p.score.pts:"0"}</span>`;}
        else right=`<span class="pp">${p.pick.h}-${p.pick.a}</span>`;
      }else right=`<span class="hidden-sc">🔒 hidden</span>`;
      r.innerHTML=`<span class="pn">${esc(p.name)}${p.isYou?'<span class="tag me-tag">YOU</span>':''}</span>${right}`;
      panel.appendChild(r);
    });
    btn.onclick=()=>{const open=panel.style.display!=="none";panel.style.display=open?"none":"";btn.classList.toggle("open",!open);};
    reveal.appendChild(btn);reveal.appendChild(panel);card.appendChild(reveal);
  }
  return card;
}

function stepper(m,side,val){
  const wrap=el("div","stepper");
  const minus=el("button");minus.type="button";minus.textContent="–";
  const input=document.createElement("input");input.type="number";input.min=0;input.max=20;input.inputMode="numeric";
  input.value=val===0?0:(val||"");input.placeholder="0";
  const plus=el("button");plus.type="button";plus.textContent="+";
  const commit=()=>{let v=parseInt(input.value,10);if(isNaN(v)||v<0)v=0;if(v>20)v=20;input.value=v;savePick(m,side,v);};
  minus.onclick=()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.max(0,v-1);input.value=v;commit();};
  plus.onclick=()=>{let v=parseInt(input.value,10);if(isNaN(v))v=0;v=Math.min(20,v+1);input.value=v;commit();};
  input.addEventListener("change",commit);input.addEventListener("blur",commit);
  wrap.appendChild(minus);wrap.appendChild(input);wrap.appendChild(plus);return wrap;
}
async function savePick(m,side,v){
  const cur=Object.assign({h:null,a:null},Store.myPicks(ME.code)[m.id]||{});
  cur[side]=v;if(cur.h==null)cur.h=0;if(cur.a==null)cur.a=0;
  await Store.savePick(ME.code,ME.name,m.id,cur.h,cur.a);
  const s=document.querySelector(`[data-saved="${m.id}"]`);
  if(s){s.classList.add("show");clearTimeout(savedTimer);savedTimer=setTimeout(()=>s.classList.remove("show"),1300);}
  $(".me-chip .pts").innerHTML=totalFor(Store.myPicks(ME.code)).total+'<small> PTS</small>';
}

function renderMyPicks(){
  const wrap=el("div");
  const picks=Store.myPicks(ME.code);
  const list=MATCHES.map(eff).filter(m=>picks[m.id]&&picks[m.id].h!=null).sort((a,b)=>ko(a)-ko(b));
  if(!list.length){const e=el("div","empty");e.innerHTML='<div class="big">No predictions yet</div><div>Open Today or Upcoming and predict a scoreline.</div>';wrap.appendChild(e);return wrap;}
  const editable=list.filter(m=>!isLocked(m)).length;
  const panel=el("div","panel");
  const h=el("h2");h.innerHTML=`<span>📝 My Picks</span><span class="meta">${list.length} total · ${editable} editable</span>`;panel.appendChild(h);
  list.forEach(m=>{
    const pick=picks[m.id],locked=isLocked(m);
    const row=el("div","mp-row");
    const info=el("div","mp-info");
    const teams=el("div","mp-teams");
    teams.appendChild(flagEl(m.home,m.homeFlag));
    const hn=el("span","mpt");hn.textContent=m.home;teams.appendChild(hn);
    const vm=el("span","vmid");vm.textContent="v";teams.appendChild(vm);
    const an=el("span","mpt");an.textContent=m.away;teams.appendChild(an);
    teams.appendChild(flagEl(m.away,m.awayFlag));
    const sub=el("div","mp-sub");
    sub.textContent="Group "+m.group+" · "+(m.status==="finished"?("Full time "+(m.homeScore??0)+"-"+(m.awayScore??0)):locked?"Locked":fmtKO(m));
    info.appendChild(teams);info.appendChild(sub);row.appendChild(info);

    const ctrl=el("div","mp-ctrl");
    if(!locked){
      const st=el("div","mp-steppers");
      st.appendChild(stepper(m,"h",pick.h));
      const d=el("span","pred-mid");d.textContent="–";st.appendChild(d);
      st.appendChild(stepper(m,"a",pick.a));
      ctrl.appendChild(st);
      const rm=el("button","mp-remove");rm.type="button";rm.title="Remove this prediction";rm.textContent="🗑";
      rm.onclick=()=>removePick(m);
      ctrl.appendChild(rm);
    }else{
      const pv=el("div","mp-pick");
      const val=el("span","mp-val");val.textContent=pick.h+"-"+pick.a;pv.appendChild(val);
      if(m.status==="finished"){const sc=scorePick(pick,m);const b=el("span","pts-badge "+sc.kind);b.textContent=sc.kind==="hit"?"+"+sc.pts:sc.pts>0?"+"+sc.pts:"0";pv.appendChild(b);}
      ctrl.appendChild(pv);
    }
    row.appendChild(ctrl);panel.appendChild(row);
  });
  wrap.appendChild(panel);
  return wrap;
}
async function removePick(m){
  await Store.deletePick(ME.code,ME.name,m.id);
  toast("Prediction removed");
  renderApp();
}

function renderBoard(){
  const panel=el("div","panel");
  const players=Object.values(Store.players());
  const preds=Store.predsAll();
  const rows=players.map(p=>{const t=totalFor((preds[p.code]&&preds[p.code].picks)||{});return{name:p.name,code:p.code,pts:t.total,played:t.played};})
    .sort((a,b)=>b.pts-a.pts||b.played-a.played||a.name.localeCompare(b.name));
  const h=el("h2");h.innerHTML=`<span>🏆 Leaderboard</span><span class="meta">${rows.length} player${rows.length===1?"":"s"}</span>`;panel.appendChild(h);
  if(!rows.length){const e=el("div","empty");e.innerHTML='<div class="big">No players yet</div><div>Register to join the board.</div>';panel.appendChild(e);return panel;}
  rows.forEach((p,i)=>{
    const row=el("div","lb-row"+(ME&&p.code===ME.code?" me":""));
    const rk=el("div","rank"+(i===0?" g1":i===1?" g2":i===2?" g3":""));rk.textContent=i+1;
    const nm=el("div","lb-name");nm.innerHTML=`<span class="n">${esc(p.name)}</span>${ME&&p.code===ME.code?'<span class="tag you">YOU</span>':''}`;
    const sub=el("div","lb-sub");sub.textContent=p.played+" scored";
    const pt=el("div","lb-pts");pt.textContent=p.pts;
    row.appendChild(rk);row.appendChild(nm);row.appendChild(sub);row.appendChild(pt);panel.appendChild(row);
  });
  return panel;
}

function toggleAdmin(){
  if(isAdmin){isAdmin=false;sessionStorage.removeItem("egec_admin");if(activeTab==="org")activeTab="today";renderApp();return;}
  const code=prompt("Organizer code:");
  if(code==null)return;
  if(code===CFG.adminCode){isAdmin=true;sessionStorage.setItem("egec_admin","1");activeTab="org";renderApp();toast("Organizer mode on");}
  else toast("Wrong organizer code");
}

/* ---------------- Countdown tick ---------------- */
function tick(){
  document.querySelectorAll("[data-countdown]").forEach(node=>{
    const m=MATCHES.map(eff).find(x=>x.id===node.getAttribute("data-countdown"));if(!m)return;
    const ms=lockAt(m)-now();node.textContent=fmtCountdown(ms);
    node.classList.toggle("urgent",ms<=15*60000&&ms>0);
    if(ms<=0&&!node._r){node._r=true;setTimeout(()=>renderApp(),400);}
  });
}

/* ---------------- Refresh loop ---------------- */
let refreshing=false;
async function refresh(){
  if(refreshing)return;refreshing=true;
  const ae=document.activeElement;const typing=ae&&ae.tagName==="INPUT"&&ae.closest(".card,.org-row,.org-add");
  await loadMatches();
  if(!typing&&ME)renderApp();else if(!typing&&!ME)render();
  refreshing=false;
}

/* ---------------- Init ---------------- */
(async function(){
  document.title=(CFG.orgName||"EGEC")+" · World Cup Predictor";
  await loadMatches();
  await Store.init();
  if(ME&&!listFor("today").length)activeTab="upcoming";
  render();
  setInterval(tick,1000);
  setInterval(refresh,CFG.refreshMs||30000);
})();
</script>
</body>
